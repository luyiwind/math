<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>口算练习 - 100以内不进位不退位加减法（交互版）</title>
    <style>
        :root {
            --bg: #fdf8f3;
            --card-bg: #ffffff;
            --primary: #4a90d9;
            --primary-hover: #357abd;
            --accent: #f6a623;
            --success: #4caf84;
            --text: #3e3e3e;
            --text-light: #6b6b6b;
            --border: #e8e0d8;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --font-kid: 'Comic Sans MS', 'KaiTi', 'STKaiti', '楷体', 'Noto Sans SC', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-kid);
            background: var(--bg);
            background-image: radial-gradient(circle at 15% 20%, rgba(255, 182, 121, 0.10) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(74, 144, 217, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(246, 166, 35, 0.05) 0%, transparent 60%);
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
            padding-bottom: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========== 顶部工具栏 ========== */
        .toolbar {
            position: sticky;
            top: 16px;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            background: var(--card-bg);
            border-radius: 50px;
            padding: 12px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 28px;
            backdrop-filter: blur(8px);
        }
        .toolbar button {
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 0.5px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }
        .btn-generate {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 14px rgba(74, 144, 217, 0.3);
        }
        .btn-generate:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(74, 144, 217, 0.4);
        }
        .btn-print {
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-print:hover {
            background: #f0f7ff;
            border-color: var(--primary-hover);
            color: var(--primary-hover);
            transform: translateY(-2px);
        }
        .btn-answer {
            background: #fff;
            color: var(--accent);
            border: 2px solid var(--accent);
        }
        .btn-answer:hover {
            background: #fffaf3;
            border-color: #e8961a;
            color: #e8961a;
            transform: translateY(-2px);
        }
        .btn-answer.showing {
            background: #fff8ee;
            border-color: #e8961a;
            color: #d4891a;
            box-shadow: 0 0 0 4px rgba(246, 166, 35, 0.12);
        }
        .btn-timer {
            background: #fff;
            color: #e8784a;
            border: 2px solid #e8784a;
            min-width: 100px;
            justify-content: center;
        }
        .btn-timer.running {
            background: #fff5f0;
            border-color: #d45d2a;
            color: #d45d2a;
            animation: pulse-border 1.5s infinite;
        }
        @keyframes pulse-border {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(232, 120, 74, 0.3);
            }
            50% {
                box-shadow: 0 0 0 8px rgba(232, 120, 74, 0);
            }
        }
        .timer-display {
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: #e8784a;
            min-width: 55px;
            text-align: center;
            letter-spacing: 1px;
        }
        .toolbar .separator {
            width: 1px;
            height: 28px;
            background: var(--border);
            margin: 0 4px;
            border-radius: 1px;
        }
        .toolbar .info-badge {
            font-size: 0.9rem;
            color: var(--text-light);
            background: #f9f6f1;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 500;
        }
        .print-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 500;
        }
        .print-group input {
            font-family: inherit;
            font-size: 0.9rem;
            width: 55px;
            padding: 6px 8px;
            border: 2px solid var(--border);
            border-radius: 20px;
            text-align: center;
            outline: none;
            transition: border 0.2s;
        }
        .print-group input:focus {
            border-color: var(--primary);
        }
        .page-desc {
            font-size: 0.8rem;
            color: #999;
        }

        /* ========== 主卡片 ========== */
        .main-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 28px 24px 20px;
            width: 100%;
            max-width: 1000px;
            transition: 0.3s;
        }
        .main-card .title-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .main-card .title-area h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #4a4a4a;
            letter-spacing: 1px;
        }
        .main-card .title-area .subtitle {
            font-size: 0.85rem;
            color: #999;
            margin-top: 2px;
        }
        .title-area .decor {
            display: inline-block;
            font-size: 1.3rem;
            margin: 0 5px;
            animation: bounce 2s infinite;
        }
        .title-area .decor:nth-child(1) {
            animation-delay: 0s;
        }
        .title-area .decor:nth-child(2) {
            animation-delay: 0.4s;
        }
        .title-area .decor:nth-child(3) {
            animation-delay: 0.8s;
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-4px);
            }
        }

        /* 题目网格 */
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px 14px;
            counter-reset: qnum;
        }
        @media (min-width: 900px) {
            .questions-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px 18px;
            }
        }
        .question-item {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding: 7px 6px 7px 34px;
            border-bottom: 1px dashed #f0ebe2;
            white-space: nowrap;
            border-radius: 6px;
            counter-increment: qnum;
            position: relative;
            transition: background 0.2s;
            cursor: default;
        }
        .question-item::before {
            content: counter(qnum) ".";
            position: absolute;
            left: 6px;
            font-size: 0.75rem;
            color: #c5bfb6;
            font-weight: 500;
            min-width: 22px;
            text-align: right;
        }
        .question-item.active {
            background: #fffdf5;
            box-shadow: inset 0 0 0 2px var(--accent);
            border-radius: 8px;
            border-bottom-color: transparent;
        }
        .question-item.completed {
            background: #fafff8;
        }
        .question-item .operator {
            margin: 0 2px;
            color: #555;
        }
        .question-item .equals {
            margin: 0 3px;
            color: #888;
            font-weight: 500;
        }
        .question-item .number {
            color: #3e3e3e;
        }
        .question-item .blank {
            display: inline-block;
            min-width: 38px;
            border-bottom: 2.5px solid #555;
            margin: 0 3px;
            text-align: center;
            color: #aaa;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            padding: 0 2px;
            border-radius: 2px;
        }
        .question-item .blank:hover {
            border-bottom-color: var(--accent);
            color: #888;
            background: #fffdf5;
        }
        .question-item .blank.filled {
            color: #2c6e49;
            border-bottom-color: #4caf84;
            font-weight: 700;
            cursor: pointer;
        }
        .question-item .blank.active-blank {
            border-bottom-color: var(--accent);
            color: #e8784a;
            background: #fff8ee;
            animation: blink-border 0.8s infinite;
            min-width: 42px;
        }
        @keyframes blink-border {
            0%,
            100% {
                border-bottom-width: 3px;
            }
            50% {
                border-bottom-width: 1.5px;
            }
        }

        /* 答案区域 */
        .answers-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 2px dashed #e8e0d8;
            display: none;
        }
        .answers-section.visible {
            display: block;
        }
        .answers-section h3 {
            text-align: center;
            font-size: 1rem;
            color: #888;
            margin-bottom: 10px;
        }
        .answers-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 4px 8px;
            font-size: 0.85rem;
        }
        @media (min-width: 900px) {
            .answers-grid {
                grid-template-columns: repeat(10, 1fr);
            }
        }
        .answer-item {
            text-align: center;
            padding: 4px 3px;
            background: #fdfaf5;
            border-radius: 5px;
            font-weight: 600;
            color: #e8784a;
            font-size: 0.8rem;
        }

        /* ========== 底部数字键盘 ========== */
        .keyboard-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 200;
            background: #fff;
            border-top: 2px solid #e8e0d8;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.10);
            padding: 10px 16px 16px;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            gap: 12px;
            align-items: flex-start;
            max-width: 600px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            border-radius: 16px 16px 0 0;
        }
        .keyboard-panel.visible {
            transform: translateX(-50%) translateY(0);
        }
        .keyboard-main {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            flex: 1;
        }
        .keyboard-main button {
            font-family: inherit;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 12px 8px;
            border-radius: 12px;
            border: 2px solid #e8e0d8;
            background: #fafaf7;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            color: #3e3e3e;
            min-height: 48px;
        }
        .keyboard-main button:active {
            background: #f0ebe2;
            transform: scale(0.94);
            border-color: #ccc;
        }
        .keyboard-main button.key-del {
            font-size: 1rem;
            color: #c0392b;
            border-color: #fdd;
            background: #fff5f5;
        }
        .keyboard-main button.key-clear {
            font-size: 0.95rem;
            color: #888;
            border-color: #e8e0d8;
            background: #f5f5f0;
        }
        .keyboard-side {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 70px;
        }
        .keyboard-side .preview {
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            padding: 10px 6px;
            background: #fffdf5;
            border: 2px dashed #e0d8c8;
            border-radius: 12px;
            color: #e8784a;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 2px;
        }
        .keyboard-side .preview.empty {
            color: #ccc;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .btn-done {
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            padding: 12px 10px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: var(--success);
            color: #fff;
            box-shadow: 0 3px 12px rgba(76, 175, 132, 0.3);
            transition: all 0.2s;
            white-space: nowrap;
            letter-spacing: 1px;
            user-select: none;
        }
        .btn-done:hover {
            background: #3d9d6e;
            transform: translateY(-1px);
            box-shadow: 0 5px 16px rgba(76, 175, 132, 0.4);
        }
        .btn-done:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(76, 175, 132, 0.25);
        }

        /* ========== 打印容器 ========== */
        #printContainer {
            display: none;
        }

        @media print {
            body {
                background: #fff !important;
                padding: 0 !important;
                margin: 0 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .toolbar,
            .main-card,
            .keyboard-panel {
                display: none !important;
            }
            #printContainer {
                display: block !important;
            }
            @page {
                size: A4;
                margin: 8mm 16mm 8mm 16mm;
            }
        }

        .print-page {
            page-break-after: always;
            font-family: 'KaiTi', 'STKaiti', '楷体', 'Noto Sans SC', sans-serif;
            color: #000;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .print-page:last-child {
            page-break-after: auto;
        }
        .page-header {
            text-align: center;
            margin-bottom: 3mm;
        }
        .page-header h2 {
            font-size: 16pt;
            margin: 0 0 2mm;
            letter-spacing: 2px;
        }
        .info-line {
            font-size: 9pt;
            color: #222;
            display: flex;
            justify-content: center;
            gap: 10mm;
            margin-bottom: 2mm;
        }
        .day-block {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .day-block+.day-block {
            margin-top: 4mm;
        }
        .day-title {
            font-size: 10pt;
            font-weight: bold;
            border-bottom: 1px dashed #000;
            padding-bottom: 1.5mm;
            margin-bottom: 2mm;
            text-align: left;
        }
        .questions-grid-print {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3mm 6mm;
            flex: 1;
        }
        .q-item {
            font-size: 10pt;
            white-space: nowrap;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 640px) {
            .questions-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px 8px;
            }
            .question-item {
                font-size: 0.95rem;
                padding: 6px 4px 6px 28px;
            }
            .question-item::before {
                font-size: 0.7rem;
                left: 3px;
                min-width: 18px;
            }
            .toolbar {
                padding: 8px 10px;
                gap: 6px;
                border-radius: 30px;
            }
            .toolbar button {
                font-size: 0.8rem;
                padding: 7px 12px;
            }
            .toolbar .separator {
                display: none;
            }
            .toolbar .info-badge {
                font-size: 0.7rem;
                padding: 5px 8px;
            }
            .main-card {
                padding: 16px 8px 10px;
                border-radius: 10px;
            }
            .keyboard-panel {
                max-width: 100%;
                border-radius: 12px 12px 0 0;
                padding: 8px 10px 12px;
                gap: 8px;
            }
            .keyboard-main button {
                font-size: 1.1rem;
                padding: 10px 6px;
                min-height: 40px;
                border-radius: 8px;
            }
            .keyboard-side {
                min-width: 55px;
            }
            .keyboard-side .preview {
                font-size: 1.1rem;
                padding: 8px 4px;
                min-height: 36px;
            }
            .btn-done {
                font-size: 0.85rem;
                padding: 10px 8px;
            }
            .print-group {
                flex-wrap: wrap;
                gap: 4px;
            }
            .print-group input {
                width: 40px;
                font-size: 0.8rem;
            }
            body {
                padding: 10px;
                padding-bottom: 180px;
            }
        }
    </style>
</head>
<body>

    <!-- 工具栏 -->
    <div class="toolbar" id="toolbar">
        <button class="btn-generate" onclick="generateQuestions()" title="重新随机生成50道屏幕练习题">🔄 重新生成</button>
        <span class="separator"></span>
        <button class="btn-timer" id="btnTimer" onclick="toggleTimer()" title="开始/暂停计时">▶ 开始计时</button>
        <span class="timer-display" id="timerDisplay">00:00</span>
        <span class="separator"></span>
        <button class="btn-answer" id="btnAnswer" onclick="toggleAnswers()" title="在屏幕上显示/隐藏正确答案">👁️ 显示答案</button>
        <span class="separator"></span>
        <div class="print-group">
            <label for="pageCountInput">📄 打印页数：</label>
            <input type="number" id="pageCountInput" value="1" min="1" max="10" step="1">
            <span class="page-desc">（每页100题/2天量）</span>
            <button class="btn-print" onclick="printMultiplePages()">🖨️ 打印</button>
        </div>
        <span class="info-badge" id="infoBadge">共50道题</span>
    </div>

    <!-- 屏幕练习卡片 -->
    <div class="main-card" id="mainCard">
        <div class="title-area">
            <span class="decor">🌟</span>
            <h1>口 算 练 习</h1>
            <span class="decor">✏️</span>
            <p class="subtitle">100以内 · 不进位不退位 · 加减法 · 点击空格填答案</p>
        </div>
        <div class="questions-grid" id="questionsGrid"></div>
        <div class="answers-section" id="answersSection">
            <h3>📋 答 案 参 考</h3>
            <div class="answers-grid" id="answersGrid"></div>
        </div>
    </div>

    <!-- 底部弹出数字键盘 -->
    <div class="keyboard-panel" id="keyboardPanel">
        <div class="keyboard-main">
            <button onclick="inputDigit('1')">1</button>
            <button onclick="inputDigit('2')">2</button>
            <button onclick="inputDigit('3')">3</button>
            <button onclick="inputDigit('4')">4</button>
            <button onclick="inputDigit('5')">5</button>
            <button onclick="inputDigit('6')">6</button>
            <button onclick="inputDigit('7')">7</button>
            <button onclick="inputDigit('8')">8</button>
            <button onclick="inputDigit('9')">9</button>
            <button class="key-del" onclick="inputBackspace()">⌫ 退格</button>
            <button onclick="inputDigit('0')">0</button>
            <button class="key-clear" onclick="inputClear()">✕ 清空</button>
        </div>
        <div class="keyboard-side">
            <div class="preview empty" id="keyboardPreview">___</div>
            <button class="btn-done" onclick="confirmAndNext()">✓ 好了</button>
        </div>
    </div>

    <!-- 打印容器 -->
    <div id="printContainer"></div>

    <script>
        (function() {
            // ============ 全局状态 ============
            let currentQuestions = [];
            let userAnswers = {}; // { questionIndex: '用户填的数字字符串' }
            let activeQuestionIndex = -1; // 当前激活的题目索引
            let timerSeconds = 0;
            let timerInterval = null;
            let timerRunning = false;
            let currentInput = ''; // 当前正在输入的数字字符串
            const MAX_INPUT_LENGTH = 3;

            // ============ 工具函数 ============
            function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

            function isNoCarryAdd(a, b) {
                if (a + b >= 100) return false;
                const da = { tens: Math.floor(a / 10), ones: a % 10 };
                const db = { tens: Math.floor(b / 10), ones: b % 10 };
                return (da.ones + db.ones < 10) && (da.tens + db.tens < 10);
            }

            function isNoBorrowSub(a, b) {
                if (a < b) return false;
                const da = { tens: Math.floor(a / 10), ones: a % 10 };
                const db = { tens: Math.floor(b / 10), ones: b % 10 };
                return (da.ones >= db.ones) && (da.tens >= db.tens);
            }

            function generateNoCarryAddition() {
                for (let i = 0; i < 200; i++) {
                    const a = randInt(3, 85);
                    const maxB = Math.min(99 - a, 99);
                    if (maxB < 1) continue;
                    const b = randInt(1, maxB);
                    if (isNoCarryAdd(a, b) && a + b < 100 && a + b > 0) {
                        return { operands: [a, b], operators: ['+'], result: a + b };
                    }
                }
                const a = randInt(10, 40),
                    b = randInt(1, 20);
                return { operands: [a, b], operators: ['+'], result: a + b };
            }

            function generateNoBorrowSubtraction() {
                for (let i = 0; i < 200; i++) {
                    const a = randInt(10, 95);
                    const maxB = a;
                    if (maxB < 1) continue;
                    const b = randInt(1, maxB);
                    if (isNoBorrowSub(a, b) && a - b >= 0) {
                        return { operands: [a, b], operators: ['-'], result: a - b };
                    }
                }
                const a = randInt(25, 90),
                    b = randInt(1, 20);
                return { operands: [a, b], operators: ['-'], result: a - b };
            }

            function generateThreeNumOp() {
                const type = randInt(0, 2);
                for (let attempt = 0; attempt < 300; attempt++) {
                    if (type === 0) {
                        const a = randInt(3, 70);
                        const maxB = 99 - a;
                        if (maxB < 1) continue;
                        const b = randInt(1, maxB);
                        if (!isNoCarryAdd(a, b)) continue;
                        const sumAB = a + b;
                        if (sumAB >= 100) continue;
                        const maxC = 99 - sumAB;
                        if (maxC < 1) continue;
                        const c = randInt(1, maxC);
                        if (!isNoCarryAdd(sumAB, c)) continue;
                        const result = sumAB + c;
                        if (result >= 100) continue;
                        return { operands: [a, b, c], operators: ['+', '+'], result };
                    } else if (type === 1) {
                        const a = randInt(5, 70);
                        const maxB = 99 - a;
                        if (maxB < 1) continue;
                        const b = randInt(1, maxB);
                        if (!isNoCarryAdd(a, b)) continue;
                        const sumAB = a + b;
                        if (sumAB >= 100) continue;
                        const maxC = sumAB;
                        if (maxC < 1) continue;
                        const c = randInt(1, maxC);
                        if (!isNoBorrowSub(sumAB, c)) continue;
                        const result = sumAB - c;
                        if (result < 0) continue;
                        return { operands: [a, b, c], operators: ['+', '-'], result };
                    } else {
                        const a = randInt(15, 90);
                        const maxB = a;
                        if (maxB < 1) continue;
                        const b = randInt(1, maxB);
                        if (!isNoBorrowSub(a, b)) continue;
                        const diffAB = a - b;
                        if (diffAB < 0) continue;
                        const maxC = 99 - diffAB;
                        if (maxC < 1) continue;
                        const c = randInt(1, maxC);
                        if (!isNoCarryAdd(diffAB, c)) continue;
                        const result = diffAB + c;
                        if (result >= 100) continue;
                        return { operands: [a, b, c], operators: ['-', '+'], result };
                    }
                }
                return generateNoCarryAddition();
            }

            function generateSingleQuestion() {
                const useThree = Math.random() < 0.35;
                let qData = useThree ? generateThreeNumOp() :
                    (Math.random() < 0.5 ? generateNoCarryAddition() : generateNoBorrowSubtraction());
                const { operands, operators, result } = qData;
                const totalOps = operands.length;
                let blankPos;
                const r = Math.random();
                if (r < 0.45) blankPos = 0;
                else if (r < 0.75) blankPos = 1;
                else if (r < 0.95 && totalOps >= 2) blankPos = 2;
                else if (totalOps >= 3) blankPos = 3;
                else blankPos = 0;
                const blankAnswer = (blankPos === 0) ? result : operands[blankPos - 1];
                return { operands, operators, result, blankPosition: blankPos, blankAnswer, totalOps };
            }

            function getQuestionString(q, userVal) {
                const { operands, operators, blankPosition, result } = q;
                const parts = [];
                for (let i = 0; i < operands.length; i++) {
                    if (i > 0) parts.push(` ${operators[i - 1]} `);
                    if (blankPosition === i + 1) {
                        parts.push(userVal !== undefined && userVal !== '' ? userVal : '______');
                    } else {
                        parts.push(operands[i]);
                    }
                }
                parts.push(' = ');
                if (blankPosition === 0) {
                    parts.push(userVal !== undefined && userVal !== '' ? userVal : '______');
                } else {
                    parts.push(result);
                }
                return parts.join('');
            }

            function generateQuestionSet(count) {
                const questions = [];
                const seen = new Set();
                let attempts = 0;
                while (questions.length < count && attempts < count * 30) {
                    attempts++;
                    const q = generateSingleQuestion();
                    const key = `${q.operands.join(',')}|${q.operators.join(',')}|${q.blankPosition}`;
                    if (seen.has(key)) continue;
                    seen.add(key);
                    questions.push(q);
                }
                while (questions.length < count) {
                    questions.push(generateSingleQuestion());
                }
                return questions;
            }

            // ============ 键盘逻辑 ============
            function showKeyboard() {
                document.getElementById('keyboardPanel').classList.add('visible');
            }

            function hideKeyboard() {
                document.getElementById('keyboardPanel').classList.remove('visible');
                activeQuestionIndex = -1;
                currentInput = '';
                updateAllBlankDisplays();
                updateKeyboardPreview();
                document.querySelectorAll('.question-item.active').forEach(el => el.classList.remove(
                'active'));
                document.querySelectorAll('.blank.active-blank').forEach(el => el.classList.remove('active-blank'));
            }

            function activateQuestion(index) {
                // 如果点击的是已经激活的题目，且该题已有填写内容，则清空
                if (activeQuestionIndex === index) {
                    if (userAnswers[index] && userAnswers[index] !== '') {
                        // 已填内容，点击清空
                        delete userAnswers[index];
                        currentInput = '';
                        updateAllBlankDisplays();
                        updateKeyboardPreview();
                        scrollToQuestion(index);
                    }
                    return;
                }

                // 取消之前的激活
                document.querySelectorAll('.question-item.active').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.blank.active-blank').forEach(el => el.classList.remove('active-blank'));

                activeQuestionIndex = index;
                currentInput = userAnswers[index] || '';
                updateAllBlankDisplays();
                updateKeyboardPreview();
                showKeyboard();
                scrollToQuestion(index);

                // 高亮当前题目
                const item = document.querySelector(`.question-item[data-qindex="${index}"]`);
                if (item) {
                    item.classList.add('active');
                    const blank = item.querySelector('.blank');
                    if (blank) blank.classList.add('active-blank');
                }
            }

            function scrollToQuestion(index) {
                const item = document.querySelector(`.question-item[data-qindex="${index}"]`);
                if (item) {
                    item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }

            function inputDigit(digit) {
                if (activeQuestionIndex < 0) return;
                if (currentInput.length >= MAX_INPUT_LENGTH) return;
                currentInput += digit;
                userAnswers[activeQuestionIndex] = currentInput;
                updateAllBlankDisplays();
                updateKeyboardPreview();
                // 更新当前激活题目的blank显示
                refreshActiveBlank();
            }

            function inputBackspace() {
                if (activeQuestionIndex < 0) return;
                if (currentInput.length === 0) return;
                currentInput = currentInput.slice(0, -1);
                userAnswers[activeQuestionIndex] = currentInput;
                if (currentInput === '') delete userAnswers[activeQuestionIndex];
                updateAllBlankDisplays();
                updateKeyboardPreview();
                refreshActiveBlank();
            }

            function inputClear() {
                if (activeQuestionIndex < 0) return;
                currentInput = '';
                delete userAnswers[activeQuestionIndex];
                updateAllBlankDisplays();
                updateKeyboardPreview();
                refreshActiveBlank();
            }

            function confirmAndNext() {
                if (activeQuestionIndex < 0) return;
                // 保存当前答案
                if (currentInput !== '') {
                    userAnswers[activeQuestionIndex] = currentInput;
                }
                // 标记完成
                const item = document.querySelector(`.question-item[data-qindex="${activeQuestionIndex}"]`);
                if (item && userAnswers[activeQuestionIndex]) {
                    item.classList.add('completed');
                }
                // 跳到下一题
                const nextIndex = activeQuestionIndex + 1;
                if (nextIndex < currentQuestions.length) {
                    activateQuestion(nextIndex);
                } else {
                    // 最后一题，隐藏键盘
                    hideKeyboard();
                    // 滚动到顶部
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    alert('🎉 全部完成！太棒了！');
                }
            }

            function refreshActiveBlank() {
                document.querySelectorAll('.blank.active-blank').forEach(el => el.classList.remove('active-blank'));
                if (activeQuestionIndex >= 0) {
                    const item = document.querySelector(`.question-item[data-qindex="${activeQuestionIndex}"]`);
                    if (item) {
                        item.classList.add('active');
                        const blank = item.querySelector('.blank');
                        if (blank) blank.classList.add('active-blank');
                    }
                }
            }

            function updateKeyboardPreview() {
                const preview = document.getElementById('keyboardPreview');
                if (currentInput === '') {
                    preview.textContent = '___';
                    preview.classList.add('empty');
                } else {
                    preview.textContent = currentInput;
                    preview.classList.remove('empty');
                }
            }

            function updateAllBlankDisplays() {
                document.querySelectorAll('.blank').forEach(blank => {
                    const idx = parseInt(blank.getAttribute('data-qindex'));
                    if (!isNaN(idx) && userAnswers[idx] !== undefined && userAnswers[idx] !== '') {
                        blank.textContent = userAnswers[idx];
                        blank.classList.add('filled');
                    } else {
                        blank.textContent = '___';
                        blank.classList.remove('filled');
                    }
                });
            }

            // ============ 屏幕渲染 ============
            function renderScreenQuestions(questions) {
                const grid = document.getElementById('questionsGrid');
                grid.innerHTML = '';
                currentQuestions = questions;
                userAnswers = {};
                activeQuestionIndex = -1;
                currentInput = '';
                hideKeyboard();

                questions.forEach((q, idx) => {
                    const item = document.createElement('div');
                    item.className = 'question-item';
                    item.setAttribute('data-qindex', idx);
                    item.addEventListener('click', function(e) {
                        // 如果点击的是blank，激活该题
                        if (e.target.classList.contains('blank')) {
                            e.stopPropagation();
                            activateQuestion(idx);
                        }
                    });

                    let html = '';
                    for (let i = 0; i < q.totalOps; i++) {
                        if (i > 0) html +=
                            `<span class="operator"> ${q.operators[i - 1]} </span>`;
                        if (q.blankPosition === i + 1) {
                            html +=
                                `<span class="blank" data-qindex="${idx}" onclick="event.stopPropagation(); activateQuestion(${idx});">___</span>`;
                        } else {
                            html += `<span class="number">${q.operands[i]}</span>`;
                        }
                    }
                    html += `<span class="equals"> = </span>`;
                    if (q.blankPosition === 0) {
                        html +=
                            `<span class="blank" data-qindex="${idx}" onclick="event.stopPropagation(); activateQuestion(${idx});">___</span>`;
                    } else {
                        html += `<span class="number">${q.result}</span>`;
                    }
                    item.innerHTML = html;
                    grid.appendChild(item);
                });
                updateKeyboardPreview();
            }

            function renderScreenAnswers(questions) {
                const grid = document.getElementById('answersGrid');
                grid.innerHTML = '';
                questions.forEach((q, i) => {
                    const div = document.createElement('div');
                    div.className = 'answer-item';
                    div.textContent = `${i + 1}. ${q.blankAnswer}`;
                    grid.appendChild(div);
                });
            }

            function toggleAnswers() {
                const section = document.getElementById('answersSection');
                const btn = document.getElementById('btnAnswer');
                const visible = section.classList.contains('visible');
                if (visible) {
                    section.classList.remove('visible');
                    btn.classList.remove('showing');
                    btn.innerHTML = '👁️ 显示答案';
                } else {
                    section.classList.add('visible');
                    btn.classList.add('showing');
                    btn.innerHTML = '🙈 隐藏答案';
                }
            }

            // ============ 计时器 ============
            function toggleTimer() {
                const btn = document.getElementById('btnTimer');
                if (timerRunning) {
                    // 暂停
                    clearInterval(timerInterval);
                    timerInterval = null;
                    timerRunning = false;
                    btn.classList.remove('running');
                    btn.innerHTML = '▶ 继续计时';
                } else {
                    // 开始
                    timerInterval = setInterval(() => {
                        timerSeconds++;
                        updateTimerDisplay();
                    }, 1000);
                    timerRunning = true;
                    btn.classList.add('running');
                    btn.innerHTML = '⏸ 暂停';
                }
            }

            function resetTimer() {
                clearInterval(timerInterval);
                timerInterval = null;
                timerRunning = false;
                timerSeconds = 0;
                updateTimerDisplay();
                const btn = document.getElementById('btnTimer');
                btn.classList.remove('running');
                btn.innerHTML = '▶ 开始计时';
            }

            function updateTimerDisplay() {
                const mins = Math.floor(timerSeconds / 60);
                const secs = timerSeconds % 60;
                document.getElementById('timerDisplay').textContent =
                    String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            }

            // ============ 打印 ============
            function printMultiplePages() {
                const input = document.getElementById('pageCountInput');
                let pages = parseInt(input.value, 10);
                if (isNaN(pages) || pages < 1) pages = 1;
                if (pages > 10) pages = 10;
                input.value = pages;

                const totalQuestions = pages * 100;
                const allQuestions = generateQuestionSet(totalQuestions);
                let printHTML = '';

                for (let p = 0; p < pages; p++) {
                    const start = p * 100;
                    const pageQuestions = allQuestions.slice(start, start + 100);
                    const day1 = pageQuestions.slice(0, 50);
                    const day2 = pageQuestions.slice(50, 100);
                    const dayNum1 = p * 2 + 1;
                    const dayNum2 = p * 2 + 2;

                    printHTML += `<div class="print-page">`;
                    printHTML += `<div class="page-header">`;
                    printHTML += `<h2>口 算 练 习</h2>`;
                    printHTML += `<div class="info-line">`;
                    printHTML += `<span>姓名：__________</span>`;
                    printHTML += `<span>日期：__________</span>`;
                    printHTML += `<span>用时：__________</span>`;
                    printHTML += `</div></div>`;

                    printHTML += `<div class="day-block">`;
                    printHTML += `<div class="day-title">第 ${dayNum1} 天 （共50题）</div>`;
                    printHTML += `<div class="questions-grid-print">`;
                    day1.forEach((q) => {
                        printHTML +=
                            `<div class="q-item">${getQuestionString(q, undefined)}</div>`;
                    });
                    printHTML += `</div></div>`;

                    printHTML += `<div class="day-block">`;
                    printHTML += `<div class="day-title">第 ${dayNum2} 天 （共50题）</div>`;
                    printHTML += `<div class="questions-grid-print">`;
                    day2.forEach((q) => {
                        printHTML +=
                            `<div class="q-item">${getQuestionString(q, undefined)}</div>`;
                    });
                    printHTML += `</div></div>`;

                    printHTML += `</div>`;
                }

                document.getElementById('printContainer').innerHTML = printHTML;

                if (document.getElementById('answersSection').classList.contains('visible')) {
                    toggleAnswers();
                }

                setTimeout(() => window.print(), 150);
            }

            // ============ 初始化 ============
            function generateQuestions() {
                resetTimer();
                const qs = generateQuestionSet(50);
                renderScreenQuestions(qs);
                renderScreenAnswers(qs);
                document.getElementById('infoBadge').textContent = `共${qs.length}道题`;
                document.getElementById('mainCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            // ============ 键盘快捷键 ============
            document.addEventListener('keydown', function(e) {
                if (activeQuestionIndex < 0) return;
                if (e.key >= '0' && e.key <= '9') {
                    e.preventDefault();
                    inputDigit(e.key);
                } else if (e.key === 'Backspace') {
                    e.preventDefault();
                    inputBackspace();
                } else if (e.key === 'Delete') {
                    e.preventDefault();
                    inputClear();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    confirmAndNext();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    hideKeyboard();
                }
            });

            // 点击键盘面板外的空白区域关闭键盘
            document.addEventListener('click', function(e) {
                if (activeQuestionIndex >= 0) {
                    const panel = document.getElementById('keyboardPanel');
                    const clickedInPanel = panel.contains(e.target);
                    const clickedOnBlank = e.target.classList.contains('blank');
                    const clickedOnQuestionItem = e.target.closest('.question-item');
                    if (!clickedInPanel && !clickedOnBlank && !clickedOnQuestionItem) {
                        // 点击了无关区域，保存当前输入并关闭键盘
                        if (currentInput !== '') {
                            userAnswers[activeQuestionIndex] = currentInput;
                        }
                        hideKeyboard();
                    }
                }
            });

            // 暴露全局
            window.generateQuestions = generateQuestions;
            window.toggleAnswers = toggleAnswers;
            window.printMultiplePages = printMultiplePages;
            window.toggleTimer = toggleTimer;
            window.inputDigit = inputDigit;
            window.inputBackspace = inputBackspace;
            window.inputClear = inputClear;
            window.confirmAndNext = confirmAndNext;
            window.activateQuestion = activateQuestion;

            document.addEventListener('DOMContentLoaded', () => {
                generateQuestions();
                updateTimerDisplay();
            });

            console.log('✨ 交互式口算练习已就绪！');
            console.log('   - 点击空格 → 弹出数字键盘');
            console.log('   - 输入数字（最多3位）');
            console.log('   - 点击已填数字可修改');
            console.log('   - 点击"好了"→ 跳转下一题');
            console.log('   - 计时器：开始/暂停');
            console.log('   - 支持键盘快捷键：数字键、退格、回车');
            console.log('   🎒 祝小朋友学习进步！');
        })();
    </script>
</body>
</html>
