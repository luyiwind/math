<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>口算练习 - 100以内不进位不退位加减法（多页打印）</title>
    <style>
        :root {
            --bg: #fdf8f3;
            --card-bg: #ffffff;
            --primary: #4a90d9;
            --primary-hover: #357abd;
            --accent: #f6a623;
            --text: #3e3e3e;
            --text-light: #6b6b6b;
            --border: #e8e0d8;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --font-kid: 'Comic Sans MS', 'KaiTi', 'STKaiti', '楷体', 'Noto Sans SC', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-kid);
            background: var(--bg);
            background-image:
                radial-gradient(circle at 15% 20%, rgba(255, 182, 121, 0.10) 0%, transparent 50%),
                radial-gradient(circle at 85% 75%, rgba(74, 144, 217, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(246, 166, 35, 0.05) 0%, transparent 60%);
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========== 顶部工具栏 ========== */
        .toolbar {
            position: sticky;
            top: 16px;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            background: var(--card-bg);
            border-radius: 50px;
            padding: 12px 24px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 28px;
            backdrop-filter: blur(8px);
        }
        .toolbar button {
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 22px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-generate {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 14px rgba(74, 144, 217, 0.3);
        }
        .btn-generate:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(74, 144, 217, 0.4);
        }
        .btn-generate:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(74, 144, 217, 0.25);
        }
        .btn-print {
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-print:hover {
            background: #f0f7ff;
            border-color: var(--primary-hover);
            color: var(--primary-hover);
            transform: translateY(-2px);
        }
        .btn-answer {
            background: #fff;
            color: var(--accent);
            border: 2px solid var(--accent);
        }
        .btn-answer:hover {
            background: #fffaf3;
            border-color: #e8961a;
            color: #e8961a;
            transform: translateY(-2px);
        }
        .btn-answer.showing {
            background: #fff8ee;
            border-color: #e8961a;
            color: #d4891a;
            box-shadow: 0 0 0 4px rgba(246, 166, 35, 0.12);
        }
        .toolbar .separator {
            width: 1px;
            height: 28px;
            background: var(--border);
            margin: 0 4px;
            border-radius: 1px;
        }
        .toolbar .info-badge {
            font-size: 0.9rem;
            color: var(--text-light);
            background: #f9f6f1;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .print-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 500;
        }
        .print-group input {
            font-family: inherit;
            font-size: 0.9rem;
            width: 55px;
            padding: 6px 8px;
            border: 2px solid var(--border);
            border-radius: 20px;
            text-align: center;
            outline: none;
            transition: border 0.2s;
        }
        .print-group input:focus {
            border-color: var(--primary);
        }
        .page-desc {
            font-size: 0.8rem;
            color: #999;
        }

        /* ========== 主内容卡片 ========== */
        .main-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 32px 28px 24px;
            width: 100%;
            max-width: 1000px;
            transition: all 0.3s ease;
        }
        .main-card .title-area {
            text-align: center;
            margin-bottom: 24px;
        }
        .main-card .title-area h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #4a4a4a;
            letter-spacing: 1px;
            margin: 0;
        }
        .main-card .title-area .subtitle {
            font-size: 0.9rem;
            color: #999;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }
        .title-area .decor {
            display: inline-block;
            font-size: 1.4rem;
            margin: 0 6px;
            animation: bounce 2s ease-in-out infinite;
        }
        .title-area .decor:nth-child(1) {
            animation-delay: 0s;
        }
        .title-area .decor:nth-child(2) {
            animation-delay: 0.4s;
        }
        .title-area .decor:nth-child(3) {
            animation-delay: 0.8s;
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-5px);
            }
        }

        /* ========== 题目网格 ========== */
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px 20px;
            counter-reset: qnum;
        }
        @media (min-width: 900px) {
            .questions-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px 24px;
            }
        }
        .question-item {
            display: flex;
            align-items: center;
            gap: 2px;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 0.6px;
            padding: 8px 6px;
            border-bottom: 1px dashed #f0ebe2;
            white-space: nowrap;
            transition: background 0.2s;
            border-radius: 6px;
            counter-increment: qnum;
            position: relative;
            padding-left: 36px;
        }
        .question-item::before {
            content: counter(qnum) ".";
            position: absolute;
            left: 6px;
            font-size: 0.8rem;
            color: #c5bfb6;
            font-weight: 500;
            min-width: 22px;
            text-align: right;
        }
        .question-item:hover {
            background: #fefcf9;
        }
        .question-item .blank {
            display: inline-block;
            min-width: 40px;
            border-bottom: 2.5px solid #555;
            margin: 0 4px;
            text-align: center;
            color: transparent;
            transition: all 0.3s;
            position: relative;
            font-weight: 700;
        }
        .question-item .blank.revealed {
            color: #e8784a;
            border-bottom-color: #e8784a;
            min-width: auto;
            padding: 0 2px;
        }
        .question-item .operator {
            margin: 0 2px;
            color: #555;
        }
        .question-item .equals {
            margin: 0 3px;
            color: #888;
            font-weight: 500;
        }
        .question-item .number {
            color: #3e3e3e;
        }

        /* ========== 答案区域 ========== */
        .answers-section {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 2px dashed #e8e0d8;
            display: none;
        }
        .answers-section.visible {
            display: block;
        }
        .answers-section h3 {
            text-align: center;
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }
        .answers-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px 10px;
            font-size: 0.9rem;
        }
        @media (min-width: 900px) {
            .answers-grid {
                grid-template-columns: repeat(10, 1fr);
            }
        }
        .answer-item {
            text-align: center;
            padding: 5px 4px;
            background: #fdfaf5;
            border-radius: 6px;
            font-weight: 600;
            color: #e8784a;
            letter-spacing: 0.3px;
            font-size: 0.85rem;
        }

        /* ========== 打印多页容器（屏幕隐藏，打印时显示） ========== */
        #printContainer {
            display: none;
        }
        @media print {
            /* 隐藏工具栏和主卡片 */
            body {
                background: #fff !important;
                padding: 0 !important;
                margin: 0 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .toolbar,
            .main-card {
                display: none !important;
            }
            #printContainer {
                display: block !important;
            }
            @page {
                size: A4;
                margin: 10mm 8mm 10mm 8mm;
            }
        }

        /* 打印页样式 */
        .print-page {
            page-break-after: always;
            font-family: 'KaiTi', 'STKaiti', '楷体', 'Noto Sans SC', sans-serif;
            color: #000;
            padding: 0 4mm;
        }
        .print-page:last-child {
            page-break-after: auto;
        }
        .page-header {
            text-align: center;
            margin-bottom: 3mm;
        }
        .page-header h2 {
            font-size: 16pt;
            margin: 0 0 2mm;
            letter-spacing: 2px;
        }
        .page-header .info-line {
            font-size: 9pt;
            color: #333;
            display: flex;
            justify-content: center;
            gap: 15mm;
            margin-bottom: 2mm;
        }
        .day-block {
            margin-bottom: 4mm;
            page-break-inside: avoid;
        }
        .day-title {
            font-size: 11pt;
            font-weight: bold;
            border-bottom: 1px dashed #000;
            padding-bottom: 1mm;
            margin-bottom: 2mm;
            text-align: left;
        }
        .questions-grid-print {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5mm 4mm;
        }
        .q-item {
            font-size: 9pt;
            white-space: nowrap;
            line-height: 1.4;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 640px) {
            .questions-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px 8px;
            }
            .question-item {
                font-size: 1rem;
                padding: 6px 2px 6px 28px;
            }
            .toolbar {
                padding: 10px 14px;
                gap: 8px;
                border-radius: 36px;
            }
            .toolbar button {
                font-size: 0.85rem;
                padding: 8px 14px;
            }
            .toolbar .separator {
                display: none;
            }
            .toolbar .info-badge {
                font-size: 0.75rem;
                padding: 6px 10px;
            }
            .main-card {
                padding: 16px 10px 12px;
                border-radius: 12px;
            }
            .answers-grid {
                grid-template-columns: repeat(5, 1fr);
            }
            .print-group {
                flex-wrap: wrap;
                gap: 6px;
            }
        }
    </style>
</head>
<body>

    <!-- 工具栏 -->
    <div class="toolbar" id="toolbar">
        <button class="btn-generate" onclick="generateQuestions()" title="重新随机生成50道屏幕练习题">
            🔄 重新生成
        </button>
        <span class="separator"></span>
        <button class="btn-answer" id="btnAnswer" onclick="toggleAnswers()" title="在屏幕上显示/隐藏答案">
            👁️ 显示答案
        </button>
        <span class="separator"></span>
        <div class="print-group">
            <label for="pageCountInput">📄 打印页数：</label>
            <input type="number" id="pageCountInput" value="1" min="1" max="10" step="1">
            <span class="page-desc">（每页100题 = 2天量）</span>
            <button class="btn-print" onclick="printMultiplePages()">🖨️ 打印多页</button>
        </div>
        <span class="info-badge" id="infoBadge">屏幕：共50道题</span>
    </div>

    <!-- 主内容卡片（屏幕练习用） -->
    <div class="main-card" id="mainCard">
        <div class="title-area">
            <span class="decor">🌟</span>
            <h1>口 算 练 习</h1>
            <span class="decor">✏️</span>
            <p class="subtitle">100以内 · 不进位不退位 · 加减法</p>
            <p class="subtitle" style="font-size:0.75rem;color:#bbb;">姓名：__________ &nbsp;&nbsp; 日期：__________ &nbsp;&nbsp; 用时：__________</p>
        </div>

        <!-- 题目网格 -->
        <div class="questions-grid" id="questionsGrid">
            <!-- 动态生成 -->
        </div>

        <!-- 答案区域 -->
        <div class="answers-section" id="answersSection">
            <h3>📋 答 案 参 考</h3>
            <div class="answers-grid" id="answersGrid">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- 多页打印容器（屏幕不可见） -->
    <div id="printContainer"></div>

    <script>
        (function() {
            // ============ 工具函数 ============
            function randInt(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            function getDigits(n) {
                return { tens: Math.floor(n / 10), ones: n % 10 };
            }

            // ============ 生成两数不进位加法 ============
            function generateNoCarryAddition() {
                for (let attempt = 0; attempt < 200; attempt++) {
                    const a = randInt(3, 85);
                    const da = getDigits(a);
                    const maxBTens = Math.min(9, 9 - da.tens);
                    if (maxBTens < 0) continue;
                    const bTens = randInt(0, maxBTens);
                    const maxBOnes = Math.min(9, 9 - da.ones);
                    if (maxBOnes < 0) continue;
                    const bOnes = randInt(0, maxBOnes);
                    const b = bTens * 10 + bOnes;
                    if (b <= 0) continue;
                    const result = a + b;
                    if (result >= 100 || result <= 0) continue;
                    if (a < 10 && b < 10 && Math.random() > 0.35) continue;
                    return { operands: [a, b], operators: ['+'], result };
                }
                const a = randInt(10, 50);
                const bTens = randInt(1, Math.min(9, 9 - getDigits(a).tens));
                const bOnes = randInt(0, Math.min(9, 9 - getDigits(a).ones));
                const b = bTens * 10 + bOnes;
                return { operands: [a, b], operators: ['+'], result: a + b };
            }

            // ============ 生成两数不退位减法 ============
            function generateNoBorrowSubtraction() {
                for (let attempt = 0; attempt < 200; attempt++) {
                    const a = randInt(10, 95);
                    const da = getDigits(a);
                    const maxBTens = da.tens;
                    const maxBOnes = da.ones;
                    if (maxBTens < 0 || maxBOnes < 0) continue;
                    const bTens = randInt(0, maxBTens);
                    const bOnes = randInt(0, maxBOnes);
                    const b = bTens * 10 + bOnes;
                    if (b <= 0) continue;
                    const result = a - b;
                    if (result < 0 || a === b) continue;
                    if (a < 10 && b < 10 && Math.random() > 0.35) continue;
                    return { operands: [a, b], operators: ['-'], result };
                }
                const a = randInt(25, 90);
                const da = getDigits(a);
                const bTens = randInt(1, da.tens);
                const bOnes = randInt(0, da.ones);
                const b = Math.max(1, bTens * 10 + bOnes);
                return { operands: [a, b], operators: ['-'], result: Math.max(0, a - b) };
            }

            // ============ 生成三数运算 (A+B+C, A+B-C, A-B+C) ============
            function generateThreeNumOp() {
                const opType = randInt(0, 2);
                const maxAttempts = 300;

                if (opType === 0) {
                    for (let attempt = 0; attempt < maxAttempts; attempt++) {
                        const a = randInt(3, 60);
                        const da = getDigits(a);
                        const maxBTens = Math.min(9, 9 - da.tens);
                        const maxBOnes = Math.min(9, 9 - da.ones);
                        if (maxBTens < 0 || maxBOnes < 0) continue;
                        const bTens = randInt(0, maxBTens);
                        const bOnes = randInt(0, maxBOnes);
                        const b = bTens * 10 + bOnes;
                        if (b <= 0) continue;
                        const s = a + b;
                        const ds = getDigits(s);
                        const maxCTens = Math.min(9, 9 - ds.tens);
                        const maxCOnes = Math.min(9, 9 - ds.ones);
                        if (maxCTens < 0 || maxCOnes < 0) continue;
                        const cTens = randInt(0, maxCTens);
                        const cOnes = randInt(0, maxCOnes);
                        const c = cTens * 10 + cOnes;
                        if (c <= 0) continue;
                        const result = s + c;
                        if (result >= 100 || result <= 0) continue;
                        if (a < 10 && b < 10 && c < 10 && Math.random() > 0.3) continue;
                        return { operands: [a, b, c], operators: ['+', '+'], result };
                    }
                } else if (opType === 1) {
                    for (let attempt = 0; attempt < maxAttempts; attempt++) {
                        const a = randInt(5, 55);
                        const da = getDigits(a);
                        const maxBTens = Math.min(9, 9 - da.tens);
                        const maxBOnes = Math.min(9, 9 - da.ones);
                        if (maxBTens < 0 || maxBOnes < 0) continue;
                        const bTens = randInt(0, maxBTens);
                        const bOnes = randInt(0, maxBOnes);
                        const b = bTens * 10 + bOnes;
                        if (b <= 0) continue;
                        const s = a + b;
                        const ds = getDigits(s);
                        const maxCTens = ds.tens;
                        const maxCOnes = ds.ones;
                        if (maxCTens < 0) continue;
                        const cTens = randInt(0, maxCTens);
                        const cOnes = randInt(0, maxCOnes);
                        const c = cTens * 10 + cOnes;
                        if (c <= 0 || c >= s) continue;
                        const result = s - c;
                        if (result < 0 || result >= 100) continue;
                        return { operands: [a, b, c], operators: ['+', '-'], result };
                    }
                } else {
                    for (let attempt = 0; attempt < maxAttempts; attempt++) {
                        const a = randInt(15, 80);
                        const da = getDigits(a);
                        const maxBTens = da.tens;
                        const maxBOnes = da.ones;
                        if (maxBTens < 0 || maxBOnes < 0) continue;
                        const bTens = randInt(0, maxBTens);
                        const bOnes = randInt(0, maxBOnes);
                        const b = bTens * 10 + bOnes;
                        if (b <= 0 || b >= a) continue;
                        const d = a - b;
                        const dd = getDigits(d);
                        const maxCTens = Math.min(9, 9 - dd.tens);
                        const maxCOnes = Math.min(9, 9 - dd.ones);
                        if (maxCTens < 0 || maxCOnes < 0) continue;
                        const cTens = randInt(0, maxCTens);
                        const cOnes = randInt(0, maxCOnes);
                        const c = cTens * 10 + cOnes;
                        if (c <= 0) continue;
                        const result = d + c;
                        if (result >= 100 || result <= 0) continue;
                        return { operands: [a, b, c], operators: ['-', '+'], result };
                    }
                }
                const a = randInt(10, 40);
                const b = randInt(5, 20);
                const c = randInt(3, 15);
                return { operands: [a, b, c], operators: ['+', '+'], result: a + b + c };
            }

            // ============ 生成单道题 ============
            function generateSingleQuestion() {
                const useThree = Math.random() < 0.35;
                let questionData = useThree ? generateThreeNumOp() :
                    (Math.random() < 0.5 ? generateNoCarryAddition() : generateNoBorrowSubtraction());

                const { operands, operators, result } = questionData;
                const totalOps = operands.length;

                let blankPosition;
                const roll = Math.random();
                if (roll < 0.45) blankPosition = 0;
                else if (roll < 0.75) blankPosition = 1;
                else if (roll < 0.95 && totalOps >= 2) blankPosition = 2;
                else if (totalOps >= 3) blankPosition = 3;
                else blankPosition = 0;

                const blankAnswer = (blankPosition === 0) ? result : operands[blankPosition - 1];

                return { operands, operators, result, blankPosition, blankAnswer, totalOps };
            }

            // ============ 生成算式字符串（用于打印） ============
            function getQuestionString(q) {
                const { operands, operators, blankPosition, result } = q;
                const parts = [];
                for (let i = 0; i < operands.length; i++) {
                    if (i > 0) parts.push(` ${operators[i - 1]} `);
                    if (blankPosition === i + 1) {
                        parts.push('______');
                    } else {
                        parts.push(operands[i]);
                    }
                }
                parts.push(' = ');
                if (blankPosition === 0) {
                    parts.push('______');
                } else {
                    parts.push(result);
                }
                return parts.join('');
            }

            // ============ 批量生成题目（指定数量） ============
            function generateQuestionSet(count) {
                const questions = [];
                const seen = new Set();
                let attempts = 0;
                while (questions.length < count && attempts < count * 30) {
                    attempts++;
                    const q = generateSingleQuestion();
                    const key = `${q.operands.join(',')}|${q.operators.join(',')}|${q.blankPosition}`;
                    if (seen.has(key)) continue;
                    seen.add(key);
                    questions.push(q);
                }
                while (questions.length < count) {
                    questions.push(generateSingleQuestion());
                }
                return questions;
            }

            // ============ 屏幕显示：50道题 ============
            function renderScreenQuestions(questions) {
                const grid = document.getElementById('questionsGrid');
                grid.innerHTML = '';
                questions.forEach((q, index) => {
                    const item = document.createElement('div');
                    item.className = 'question-item';
                    let html = '';
                    for (let i = 0; i < q.totalOps; i++) {
                        if (i > 0) html += `<span class="operator"> ${q.operators[i - 1]} </span>`;
                        if (q.blankPosition === i + 1) {
                            html += `<span class="blank" data-index="${index}">___</span>`;
                        } else {
                            html += `<span class="number">${q.operands[i]}</span>`;
                        }
                    }
                    html += `<span class="equals"> = </span>`;
                    if (q.blankPosition === 0) {
                        html += `<span class="blank" data-index="${index}">___</span>`;
                    } else {
                        html += `<span class="number">${q.result}</span>`;
                    }
                    item.innerHTML = html;
                    item.setAttribute('data-qindex', index);
                    grid.appendChild(item);
                });
                window._currentQuestions = questions;
            }

            function renderScreenAnswers(questions) {
                const answersGrid = document.getElementById('answersGrid');
                answersGrid.innerHTML = '';
                questions.forEach((q, i) => {
                    const div = document.createElement('div');
                    div.className = 'answer-item';
                    div.textContent = `${i + 1}. ${q.blankAnswer}`;
                    answersGrid.appendChild(div);
                });
            }

            function toggleAnswers() {
                const section = document.getElementById('answersSection');
                const btn = document.getElementById('btnAnswer');
                const visible = section.classList.contains('visible');
                if (visible) {
                    section.classList.remove('visible');
                    btn.classList.remove('showing');
                    btn.innerHTML = '👁️ 显示答案';
                    document.querySelectorAll('.blank.revealed').forEach(b => b.classList.remove('revealed'));
                    document.querySelectorAll('.blank').forEach(b => b.textContent = '___');
                } else {
                    section.classList.add('visible');
                    btn.classList.add('showing');
                    btn.innerHTML = '🙈 隐藏答案';
                    const qs = window._currentQuestions || [];
                    document.querySelectorAll('.blank').forEach((b, i) => {
                        if (i < qs.length) {
                            b.textContent = qs[i].blankAnswer;
                            b.classList.add('revealed');
                        }
                    });
                }
            }

            // ============ 多页打印功能 ============
            function printMultiplePages() {
                const pageCountInput = document.getElementById('pageCountInput');
                let pageCount = parseInt(pageCountInput.value, 10);
                if (isNaN(pageCount) || pageCount < 1) pageCount = 1;
                if (pageCount > 10) pageCount = 10;
                pageCountInput.value = pageCount;

                const totalQuestions = pageCount * 100;
                const allQuestions = generateQuestionSet(totalQuestions);

                // 构建打印HTML
                let printHTML = '';
                for (let p = 0; p < pageCount; p++) {
                    const start = p * 100;
                    const pageQuestions = allQuestions.slice(start, start + 100);
                    const day1 = pageQuestions.slice(0, 50);
                    const day2 = pageQuestions.slice(50, 100);

                    printHTML += `<div class="print-page">`;
                    printHTML += `<div class="page-header">`;
                    printHTML += `<h2>口 算 练 习</h2>`;
                    printHTML += `<div class="info-line">`;
                    printHTML += `<span>姓名：__________</span>`;
                    printHTML += `<span>日期：__________</span>`;
                    printHTML += `<span>用时：__________</span>`;
                    printHTML += `</div></div>`;

                    // 第一天
                    printHTML += `<div class="day-block">`;
                    printHTML += `<div class="day-title">第 1 天 （1 - 50 题）</div>`;
                    printHTML += `<div class="questions-grid-print">`;
                    day1.forEach((q, idx) => {
                        printHTML +=
                            `<div class="q-item">${idx + 1}. ${getQuestionString(q)}</div>`;
                    });
                    printHTML += `</div></div>`;

                    // 第二天
                    printHTML += `<div class="day-block">`;
                    printHTML += `<div class="day-title">第 2 天 （51 - 100 题）</div>`;
                    printHTML += `<div class="questions-grid-print">`;
                    day2.forEach((q, idx) => {
                        printHTML +=
                            `<div class="q-item">${idx + 51}. ${getQuestionString(q)}</div>`;
                    });
                    printHTML += `</div></div>`;

                    printHTML += `</div>`;
                }

                const container = document.getElementById('printContainer');
                container.innerHTML = printHTML;

                // 隐藏答案（如果屏幕上正显示）
                const answersVisible = document.getElementById('answersSection').classList.contains('visible');
                if (answersVisible) {
                    toggleAnswers(); // 关闭答案显示
                }

                // 触发打印
                setTimeout(() => {
                    window.print();
                }, 150);
            }

            // ============ 初始化屏幕练习 ============
            function generateQuestions() {
                const questions = generateQuestionSet(50);
                renderScreenQuestions(questions);
                renderScreenAnswers(questions);
                const answersVisible = document.getElementById('answersSection').classList.contains('visible');
                if (answersVisible) {
                    document.querySelectorAll('.blank').forEach((b, i) => {
                        if (i < questions.length) {
                            b.textContent = questions[i].blankAnswer;
                            b.classList.add('revealed');
                        }
                    });
                }
                document.getElementById('mainCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            // 暴露全局
            window.generateQuestions = generateQuestions;
            window.toggleAnswers = toggleAnswers;
            window.printMultiplePages = printMultiplePages;

            document.addEventListener('DOMContentLoaded', () => {
                generateQuestions();
            });

            console.log('✨ 口算练习（屏幕+多页打印）已就绪');
            console.log('   - 屏幕练习：50题，点击"重新生成"更换');
            console.log('   - 多页打印：输入页数，每页100题（2天量）');
            console.log('   - 点击"打印多页"即可打印');
        })();
    </script>
</body>
</html>
