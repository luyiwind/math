<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>口算练习 - 100以内不进位不退位加减法（完整版）</title>
    <style>
        :root {
            --bg: #fdf8f3;
            --card-bg: #ffffff;
            --primary: #4a90d9;
            --primary-hover: #357abd;
            --accent: #f6a623;
            --success: #4caf84;
            --error-bg: #ffe0e0;
            --error-border: #e74c3c;
            --text: #3e3e3e;
            --text-light: #6b6b6b;
            --border: #e8e0d8;
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --radius: 16px;
            --font-kid: 'Comic Sans MS', 'KaiTi', 'STKaiti', '楷体', 'Noto Sans SC', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-kid);
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            padding: 20px 20px 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* 工具栏 */
        .toolbar {
            position: sticky; top: 16px; z-index: 100;
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center;
            background: var(--card-bg); border-radius: 50px; padding: 12px 24px;
            box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 28px;
            backdrop-filter: blur(8px);
        }
        .toolbar button {
            font-family: inherit; font-size: 0.9rem; font-weight: 600; padding: 8px 18px;
            border-radius: 50px; border: none; cursor: pointer; transition: 0.25s; letter-spacing: 0.5px;
            white-space: nowrap; display: flex; align-items: center; gap: 6px; user-select: none;
        }
        .btn-generate { background: var(--primary); color: #fff; box-shadow: 0 4px 14px rgba(74,144,217,0.3); }
        .btn-generate:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 7px 20px rgba(74,144,217,0.4); }
        .btn-print { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
        .btn-print:hover { background: #f0f7ff; border-color: var(--primary-hover); color: var(--primary-hover); transform: translateY(-2px); }
        .btn-answer { background: #fff; color: var(--accent); border: 2px solid var(--accent); }
        .btn-answer:hover { background: #fffaf3; border-color: #e8961a; color: #e8961a; transform: translateY(-2px); }
        .btn-answer.showing { background: #fff8ee; border-color: #e8961a; color: #d4891a; box-shadow: 0 0 0 4px rgba(246,166,35,0.12); }
        .btn-timer { background: #fff; color: #e8784a; border: 2px solid #e8784a; min-width: 110px; justify-content: center; }
        .btn-timer.running { background: #fff5f0; border-color: #d45d2a; color: #d45d2a; animation: pulse-border 1.5s infinite; }
        .btn-timer.submitted { background: #f0f0f0; border-color: #ccc; color: #999; cursor: not-allowed; }
        @keyframes pulse-border { 0%,100%{ box-shadow: 0 0 0 0 rgba(232,120,74,0.3); } 50%{ box-shadow: 0 0 0 8px rgba(232,120,74,0); } }
        .btn-reset-timer { background: #fff; border: 2px solid #e8e0d8; color: #999; font-size: 1.2rem; width: 42px; height: 42px; border-radius: 50%; padding: 0; justify-content: center; }
        .btn-download-pdf, .btn-download-img { background: #fff; color: #2c3e50; border: 2px solid #2c3e50; }
        .btn-download-pdf:hover, .btn-download-img:hover { background: #f0f4f8; transform: translateY(-2px); }
        .timer-display { font-family: 'Courier New', monospace; font-size: 1.1rem; font-weight: 700; color: #e8784a; min-width: 55px; text-align: center; letter-spacing: 1px; }
        .toolbar .separator { width: 1px; height: 28px; background: var(--border); margin: 0 4px; border-radius: 1px; }
        .toolbar .info-badge { font-size: 0.9rem; color: var(--text-light); background: #f9f6f1; padding: 8px 16px; border-radius: 50px; font-weight: 500; }
        .print-group { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--text-light); font-weight: 500; }
        .print-group input { font-family: inherit; font-size: 0.9rem; width: 55px; padding: 6px 8px; border: 2px solid var(--border); border-radius: 20px; text-align: center; outline: none; }
        .print-group input:focus { border-color: var(--primary); }
        .page-desc { font-size: 0.8rem; color: #999; }

        /* 主卡片 */
        .main-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); padding: 28px 24px 20px; width: 100%; max-width: 1000px; }
        .title-area { text-align: center; margin-bottom: 20px; }
        .title-area h1 { font-size: 1.6rem; font-weight: 700; color: #4a4a4a; letter-spacing: 1px; }
        .subtitle { font-size: 0.85rem; color: #999; margin-top: 2px; }
        .decor { display: inline-block; font-size: 1.3rem; margin: 0 5px; animation: bounce 2s infinite; }
        .info-inputs { display: flex; justify-content: center; gap: 20px; margin-top: 8px; font-size: 0.85rem; color: #666; }
        .info-inputs input { font-family: inherit; font-size: 0.9rem; border: none; border-bottom: 1.5px dashed #ccc; outline: none; padding: 2px 6px; width: 100px; text-align: center; background: transparent; }
        .info-inputs input:focus { border-bottom-color: var(--accent); }

        .questions-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px 14px; counter-reset: qnum; }
        @media (min-width:900px){ .questions-grid { grid-template-columns: repeat(3,1fr); gap: 8px 18px; } }
        .question-item {
            display: flex; align-items: center; gap: 2px; font-size: 1.15rem; font-weight: 600; letter-spacing: 0.5px;
            padding: 7px 6px 7px 34px; border-bottom: 1px dashed #f0ebe2; white-space: nowrap; border-radius: 6px;
            counter-increment: qnum; position: relative; transition: background 0.2s;
        }
        .question-item::before { content: counter(qnum) "."; position: absolute; left: 6px; font-size: 0.75rem; color: #c5bfb6; font-weight: 500; min-width: 22px; text-align: right; }
        .question-item.active { background: #fffdf5; box-shadow: inset 0 0 0 2px var(--accent); border-radius: 8px; }
        .question-item.completed { background: #fafff8; }
        .question-item.error { background: var(--error-bg); }
        .blank {
            display: inline-block; min-width: 38px; border-bottom: 2.5px solid #555; margin: 0 3px; text-align: center;
            color: #aaa; font-weight: 700; cursor: pointer; transition: all 0.2s; user-select: none; padding: 0 2px; border-radius: 2px;
        }
        .blank.filled { color: #2c6e49; border-bottom-color: #4caf84; }
        .blank.active-blank { border-bottom-color: var(--accent); color: #e8784a; background: #fff8ee; animation: blink-border 0.8s infinite; min-width: 42px; }
        @keyframes blink-border { 0%,100%{ border-bottom-width:3px; } 50%{ border-bottom-width:1.5px; } }
        .answers-section { margin-top: 20px; padding-top: 16px; border-top: 2px dashed #e8e0d8; display: none; }
        .answers-section.visible { display: block; }
        .answers-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 4px 8px; font-size: 0.85rem; }
        .keyboard-panel {
            position: fixed; bottom: 0; z-index: 200; background: #fff; border-top: 2px solid #e8e0d8;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.10); padding: 10px 16px 16px; transform: translateY(100%);
            transition: transform 0.35s; display: flex; gap: 12px; max-width: 600px; left: 50%; transform: translateX(-50%) translateY(100%); border-radius: 16px 16px 0 0;
        }
        .keyboard-panel.visible { transform: translateX(-50%) translateY(0); }
        .keyboard-main { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; flex: 1; }
        .keyboard-main button { font-family: inherit; font-size: 1.3rem; font-weight: 700; padding: 12px 8px; border-radius: 12px; border: 2px solid #e8e0d8; background: #fafaf7; cursor: pointer; min-height: 48px; }
        .key-del { color: #c0392b; }
        .keyboard-side { display: flex; flex-direction: column; gap: 8px; min-width: 70px; }
        .preview { font-size: 1.4rem; font-weight: 700; text-align: center; padding: 10px 6px; background: #fffdf5; border: 2px dashed #e0d8c8; border-radius: 12px; color: #e8784a; min-height: 44px; display: flex; align-items: center; justify-content: center; }
        .preview.empty { color: #ccc; }
        .btn-done { font-family: inherit; font-size: 1rem; font-weight: 700; padding: 12px 10px; border-radius: 12px; border: none; cursor: pointer; background: var(--success); color: #fff; }
        #printContainer, #exportContainer { display: none; }

        @media print { body { background: #fff !important; padding: 0 !important; } .toolbar,.main-card,.keyboard-panel { display: none !important; } }
        /* 导出样式 */
        .export-page {
            width: 210mm; min-height: 297mm; padding: 15mm 15mm; font-family: 'KaiTi','STKaiti','楷体',sans-serif;
            background: #fff; color: #000; margin: 0 auto;
        }
        .export-header { text-align: center; margin-bottom: 8mm; }
        .export-header h2 { font-size: 22pt; margin-bottom: 3mm; }
        .export-info { font-size: 11pt; display: flex; justify-content: center; gap: 15mm; }
        .export-list { display: grid; grid-template-columns: repeat(4,1fr); gap: 4mm 8mm; }
        .export-item { font-size: 11pt; line-height: 1.8; white-space: nowrap; }
        .export-item .wrong-mark { color: #e74c3c; font-weight: bold; }
        .export-item .correction { color: #e74c3c; margin-left: 4px; }

        @media (max-width:640px){
            .questions-grid { grid-template-columns: repeat(2,1fr); }
            .toolbar { padding: 8px 10px; gap: 6px; }
            .toolbar button { font-size: 0.8rem; padding: 6px 12px; }
            .keyboard-panel { max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="toolbar">
    <button class="btn-generate" onclick="generateQuestions()">🔄 重新生成</button>
    <span class="separator"></span>
    <button class="btn-timer" id="btnTimer" onclick="handleTimerClick()">▶ 开始计时</button>
    <span class="timer-display" id="timerDisplay">00:00</span>
    <button class="btn-reset-timer" onclick="resetTimerOnly()" title="重置计时">↺</button>
    <span class="separator"></span>
    <button class="btn-download-pdf" onclick="downloadPDF()">📥 保存PDF</button>
    <button class="btn-download-img" onclick="downloadImage()">🖼️ 保存图片</button>
    <span class="separator"></span>
    <button class="btn-answer" id="btnAnswer" onclick="toggleAnswers()">👁️ 显示答案</button>
    <span class="separator"></span>
    <div class="print-group">
        <label>📄 打印页数：</label>
        <input type="number" id="pageCountInput" value="1" min="1" max="10" step="1">
        <span class="page-desc">（每页100题/2天量）</span>
        <button class="btn-print" onclick="printMultiplePages()">🖨️ 打印</button>
    </div>
    <span class="info-badge" id="infoBadge">共50道题</span>
</div>

<div class="main-card" id="mainCard">
    <div class="title-area">
        <span class="decor">🌟</span><h1>口 算 练 习</h1><span class="decor">✏️</span>
        <p class="subtitle">100以内 · 不进位不退位 · 加减法</p>
        <div class="info-inputs">
            <label>姓名：<input type="text" id="studentName" placeholder="输入姓名" value=""></label>
            <label>日期：<input type="text" id="practiceDate" placeholder="2026-07-07" value=""></label>
        </div>
    </div>
    <div class="questions-grid" id="questionsGrid"></div>
    <div class="answers-section" id="answersSection">
        <h3>📋 答 案 参 考</h3>
        <div class="answers-grid" id="answersGrid"></div>
    </div>
</div>

<div class="keyboard-panel" id="keyboardPanel">
    <div class="keyboard-main">
        <button onclick="inputDigit('1')">1</button><button onclick="inputDigit('2')">2</button><button onclick="inputDigit('3')">3</button>
        <button onclick="inputDigit('4')">4</button><button onclick="inputDigit('5')">5</button><button onclick="inputDigit('6')">6</button>
        <button onclick="inputDigit('7')">7</button><button onclick="inputDigit('8')">8</button><button onclick="inputDigit('9')">9</button>
        <button class="key-del" onclick="inputBackspace()">⌫</button><button onclick="inputDigit('0')">0</button><button class="key-clear" onclick="inputClear()">✕</button>
    </div>
    <div class="keyboard-side">
        <div class="preview empty" id="keyboardPreview">___</div>
        <button class="btn-done" onclick="confirmAndNext()">✓ 好了</button>
    </div>
</div>

<div id="printContainer"></div>
<div id="exportContainer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    (function() {
        let currentQuestions = [];
        let userAnswers = {};
        let firstWrongAnswers = {}; // { index: '第一次错误答案' }
        let errorQuestions = new Set();
        let reviewMode = false;
        let isSubmitted = false;
        let activeQuestionIndex = -1;
        let currentInput = '';
        let timerSeconds = 0;
        let timerInterval = null;
        let timerRunning = false;
        const MAX_INPUT_LENGTH = 3;

        // 工具函数
        function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
        function isNoCarryAdd(a,b){
            if(a+b>=100)return false;
            const da={tens:Math.floor(a/10),ones:a%10},db={tens:Math.floor(b/10),ones:b%10};
            return da.ones+db.ones<10 && da.tens+db.tens<10;
        }
        function isNoBorrowSub(a,b){
            if(a<b)return false;
            const da={tens:Math.floor(a/10),ones:a%10},db={tens:Math.floor(b/10),ones:b%10};
            return da.ones>=db.ones && da.tens>=db.tens;
        }
        function generateNoCarryAddition(){
            for(let i=0;i<200;i++){
                const a=randInt(3,85),maxB=Math.min(99-a,99);if(maxB<1)continue;
                const b=randInt(1,maxB);
                if(isNoCarryAdd(a,b)&&a+b<100)return {operands:[a,b],operators:['+'],result:a+b};
            }
            return {operands:[randInt(10,40),randInt(1,20)],operators:['+'],result:50};
        }
        function generateNoBorrowSubtraction(){
            for(let i=0;i<200;i++){
                const a=randInt(10,95),maxB=a;if(maxB<1)continue;
                const b=randInt(1,maxB);
                if(isNoBorrowSub(a,b))return {operands:[a,b],operators:['-'],result:a-b};
            }
            return {operands:[randInt(25,90),randInt(1,20)],operators:['-'],result:30};
        }
        function generateThreeNumOp(){
            const type=randInt(0,2);
            for(let i=0;i<300;i++){
                if(type===0){
                    const a=randInt(3,70),maxB=99-a;if(maxB<1)continue;
                    const b=randInt(1,maxB);if(!isNoCarryAdd(a,b))continue;
                    const sum=a+b;if(sum>=100)continue;
                    const maxC=99-sum;if(maxC<1)continue;
                    const c=randInt(1,maxC);if(!isNoCarryAdd(sum,c))continue;
                    const result=sum+c;if(result>=100)continue;
                    return {operands:[a,b,c],operators:['+','+'],result};
                }else if(type===1){
                    const a=randInt(5,70),maxB=99-a;if(maxB<1)continue;
                    const b=randInt(1,maxB);if(!isNoCarryAdd(a,b))continue;
                    const sum=a+b;if(sum>=100)continue;
                    const maxC=sum;if(maxC<1)continue;
                    const c=randInt(1,maxC);if(!isNoBorrowSub(sum,c))continue;
                    return {operands:[a,b,c],operators:['+','-'],result:sum-c};
                }else{
                    const a=randInt(15,90),maxB=a;if(maxB<1)continue;
                    const b=randInt(1,maxB);if(!isNoBorrowSub(a,b))continue;
                    const diff=a-b;if(diff<0)continue;
                    const maxC=99-diff;if(maxC<1)continue;
                    const c=randInt(1,maxC);if(!isNoCarryAdd(diff,c))continue;
                    return {operands:[a,b,c],operators:['-','+'],result:diff+c};
                }
            }
            return generateNoCarryAddition();
        }
        function generateSingleQuestion(){
            const useThree=Math.random()<0.35;
            let qData=useThree?generateThreeNumOp():(Math.random()<0.5?generateNoCarryAddition():generateNoBorrowSubtraction());
            const {operands,operators,result}=qData;
            const totalOps=operands.length;
            let blankPos; const r=Math.random();
            if(r<0.45)blankPos=0;else if(r<0.75)blankPos=1;else if(r<0.95&&totalOps>=2)blankPos=2;else if(totalOps>=3)blankPos=3;else blankPos=0;
            const blankAnswer=(blankPos===0)?result:operands[blankPos-1];
            return {operands,operators,result,blankPosition:blankPos,blankAnswer,totalOps};
        }
        function getQuestionString(q,userVal){
            const {operands,operators,blankPosition,result}=q;
            const parts=[];
            for(let i=0;i<operands.length;i++){
                if(i>0)parts.push(` ${operators[i-1]} `);
                parts.push(blankPosition===i+1?(userVal!==undefined&&userVal!==''?userVal:'______'):operands[i]);
            }
            parts.push(' = '); parts.push(blankPosition===0?(userVal!==undefined&&userVal!==''?userVal:'______'):result);
            return parts.join('');
        }
        function generateQuestionSet(count){
            const questions=[],seen=new Set();let attempts=0;
            while(questions.length<count&&attempts<count*30){
                attempts++;
                const q=generateSingleQuestion();
                const key=`${q.operands.join(',')}|${q.operators.join(',')}|${q.blankPosition}`;
                if(seen.has(key))continue;
                seen.add(key);questions.push(q);
            }
            while(questions.length<count)questions.push(generateSingleQuestion());
            return questions;
        }

        function checkAllFilled(){
            for(let i=0;i<currentQuestions.length;i++){
                if(!userAnswers[i]||userAnswers[i]==='')return false;
            }
            return currentQuestions.length>0;
        }

        function updateTimerButtonText(){
            const btn=document.getElementById('btnTimer');
            if(isSubmitted){
                btn.textContent='✓ 已交卷'; btn.classList.add('submitted'); btn.disabled=true;
            }else if(checkAllFilled()){
                btn.textContent='📝 交卷'; btn.classList.remove('running','submitted'); btn.disabled=false;
            }else{
                btn.textContent=timerRunning?'⏸ 暂停':'▶ 开始计时';
                btn.classList.remove('submitted'); btn.disabled=false;
            }
        }

        function startTimerIfNeeded(){
            if(!timerRunning&&!isSubmitted){
                timerInterval=setInterval(()=>{timerSeconds++;updateTimerDisplay();},1000);
                timerRunning=true; updateTimerButtonText();
            }
        }

        function pauseTimer(){
            if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
            timerRunning=false; updateTimerButtonText();
        }

        function handleTimerClick(){
            if(isSubmitted)return;
            if(checkAllFilled()){ submitExam(); }
            else{ timerRunning?pauseTimer():(timerInterval=setInterval(()=>{timerSeconds++;updateTimerDisplay();},1000),timerRunning=true,updateTimerButtonText()); }
        }

        function submitExam(){
            pauseTimer(); isSubmitted=true; checkAllAnswers(); updateTimerButtonText(); hideKeyboard();
        }

        function resetTimerOnly(){
            clearInterval(timerInterval);timerInterval=null;timerRunning=false;
            timerSeconds=0;updateTimerDisplay();
            isSubmitted=false;reviewMode=false;
            clearErrorMarks(); firstWrongAnswers={};
            updateTimerButtonText();
        }

        function updateTimerDisplay(){
            const mins=Math.floor(timerSeconds/60),secs=timerSeconds%60;
            document.getElementById('timerDisplay').textContent=String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
        }

        function checkAllAnswers(){
            errorQuestions.clear();
            document.querySelectorAll('.question-item.error').forEach(el=>el.classList.remove('error'));
            currentQuestions.forEach((q,idx)=>{
                const userVal=userAnswers[idx];
                if(userVal!==undefined&&userVal!==''){
                    if(parseInt(userVal)!==q.blankAnswer){
                        if(!firstWrongAnswers.hasOwnProperty(idx)) firstWrongAnswers[idx]=userVal; // 记录第一次错误
                        errorQuestions.add(idx);
                        document.querySelector(`.question-item[data-qindex="${idx}"]`)?.classList.add('error');
                    }
                }
            });
            reviewMode=true;
        }

        function clearErrorMarks(){
            errorQuestions.clear();
            document.querySelectorAll('.question-item.error').forEach(el=>el.classList.remove('error'));
        }

        function showKeyboard(){document.getElementById('keyboardPanel').classList.add('visible');}
        function hideKeyboard(){
            document.getElementById('keyboardPanel').classList.remove('visible');
            activeQuestionIndex=-1;currentInput='';
            updateAllBlankDisplays();updateKeyboardPreview();
            document.querySelectorAll('.question-item.active').forEach(el=>el.classList.remove('active'));
            document.querySelectorAll('.blank.active-blank').forEach(el=>el.classList.remove('active-blank'));
        }

        function activateQuestion(index){
            if(isSubmitted&&!errorQuestions.has(index))return;
            startTimerIfNeeded();
            if(activeQuestionIndex===index){
                if(userAnswers[index]&&userAnswers[index]!==''){
                    delete userAnswers[index];currentInput='';
                    updateAllBlankDisplays();updateKeyboardPreview();
                    if(errorQuestions.has(index)){
                        document.querySelector(`.question-item[data-qindex="${index}"]`)?.classList.remove('error');
                        errorQuestions.delete(index);
                    }
                    updateTimerButtonText(); scrollToQuestion(index);
                }
                return;
            }
            document.querySelectorAll('.question-item.active').forEach(el=>el.classList.remove('active'));
            document.querySelectorAll('.blank.active-blank').forEach(el=>el.classList.remove('active-blank'));
            activeQuestionIndex=index;
            currentInput=userAnswers[index]||'';
            updateAllBlankDisplays();updateKeyboardPreview();
            showKeyboard();scrollToQuestion(index);
            const item=document.querySelector(`.question-item[data-qindex="${index}"]`);
            if(item){item.classList.add('active');item.querySelector('.blank')?.classList.add('active-blank');}
        }

        function scrollToQuestion(index){
            document.querySelector(`.question-item[data-qindex="${index}"]`)?.scrollIntoView({behavior:'smooth',block:'center'});
        }

        function inputDigit(digit){
            if(activeQuestionIndex<0)return;
            if(currentInput.length>=MAX_INPUT_LENGTH)return;
            currentInput+=digit;
            userAnswers[activeQuestionIndex]=currentInput;
            updateAllBlankDisplays();updateKeyboardPreview();refreshActiveBlank();
            updateTimerButtonText();
        }
        function inputBackspace(){
            if(activeQuestionIndex<0)return;
            if(currentInput.length===0)return;
            currentInput=currentInput.slice(0,-1);
            userAnswers[activeQuestionIndex]=currentInput;
            if(currentInput==='')delete userAnswers[activeQuestionIndex];
            updateAllBlankDisplays();updateKeyboardPreview();refreshActiveBlank();
            updateTimerButtonText();
        }
        function inputClear(){
            if(activeQuestionIndex<0)return;
            currentInput='';delete userAnswers[activeQuestionIndex];
            updateAllBlankDisplays();updateKeyboardPreview();refreshActiveBlank();
            updateTimerButtonText();
        }
        function confirmAndNext(){
            if(activeQuestionIndex<0)return;
            if(currentInput!=='') userAnswers[activeQuestionIndex]=currentInput;
            if(reviewMode){
                const q=currentQuestions[activeQuestionIndex];
                const userVal=userAnswers[activeQuestionIndex];
                if(userVal!==undefined&&userVal!==''&&parseInt(userVal)===q.blankAnswer){
                    errorQuestions.delete(activeQuestionIndex);
                    document.querySelector(`.question-item[data-qindex="${activeQuestionIndex}"]`)?.classList.remove('error');
                }else{
                    if(!firstWrongAnswers.hasOwnProperty(activeQuestionIndex)) firstWrongAnswers[activeQuestionIndex]=userVal;
                    errorQuestions.add(activeQuestionIndex);
                    document.querySelector(`.question-item[data-qindex="${activeQuestionIndex}"]`)?.classList.add('error');
                    alert('答案不对，请再试试！'); return;
                }
            }
            document.querySelector(`.question-item[data-qindex="${activeQuestionIndex}"]`)?.classList.add('completed');
            updateTimerButtonText();
            const nextIndex=activeQuestionIndex+1;
            if(nextIndex<currentQuestions.length) activateQuestion(nextIndex);
            else { hideKeyboard(); window.scrollTo({top:0,behavior:'smooth'}); }
        }

        function refreshActiveBlank(){
            document.querySelectorAll('.blank.active-blank').forEach(el=>el.classList.remove('active-blank'));
            if(activeQuestionIndex>=0){
                const item=document.querySelector(`.question-item[data-qindex="${activeQuestionIndex}"]`);
                if(item){item.classList.add('active');item.querySelector('.blank')?.classList.add('active-blank');}
            }
        }
        function updateKeyboardPreview(){
            const preview=document.getElementById('keyboardPreview');
            if(currentInput===''){preview.textContent='___';preview.classList.add('empty');}
            else{preview.textContent=currentInput;preview.classList.remove('empty');}
        }
        function updateAllBlankDisplays(){
            document.querySelectorAll('.blank').forEach(blank=>{
                const idx=parseInt(blank.getAttribute('data-qindex'));
                if(!isNaN(idx)&&userAnswers[idx]!==undefined&&userAnswers[idx]!==''){
                    blank.textContent=userAnswers[idx];blank.classList.add('filled');
                }else{
                    blank.textContent='___';blank.classList.remove('filled');
                }
            });
        }

        function renderScreenQuestions(questions){
            const grid=document.getElementById('questionsGrid'); grid.innerHTML='';
            currentQuestions=questions;userAnswers={};firstWrongAnswers={};errorQuestions.clear();reviewMode=false;
            isSubmitted=false;activeQuestionIndex=-1;currentInput='';hideKeyboard();
            questions.forEach((q,idx)=>{
                const item=document.createElement('div'); item.className='question-item'; item.setAttribute('data-qindex',idx);
                item.addEventListener('click',function(e){ if(e.target.classList.contains('blank')){e.stopPropagation();activateQuestion(idx);} });
                let html='';
                for(let i=0;i<q.totalOps;i++){
                    if(i>0)html+=`<span class="operator"> ${q.operators[i-1]} </span>`;
                    if(q.blankPosition===i+1) html+=`<span class="blank" data-qindex="${idx}">___</span>`;
                    else html+=`<span class="number">${q.operands[i]}</span>`;
                }
                html+=`<span class="equals"> = </span>`;
                if(q.blankPosition===0) html+=`<span class="blank" data-qindex="${idx}">___</span>`;
                else html+=`<span class="number">${q.result}</span>`;
                item.innerHTML=html;grid.appendChild(item);
            });
            updateTimerButtonText();updateKeyboardPreview();
        }

        function renderScreenAnswers(questions){
            const grid=document.getElementById('answersGrid');grid.innerHTML='';
            questions.forEach((q,i)=>{const div=document.createElement('div');div.className='answer-item';div.textContent=`${i+1}. ${q.blankAnswer}`;grid.appendChild(div);});
        }

        function toggleAnswers(){
            const section=document.getElementById('answersSection'),btn=document.getElementById('btnAnswer');
            const visible=section.classList.contains('visible');
            if(visible){section.classList.remove('visible');btn.classList.remove('showing');btn.innerHTML='👁️ 显示答案';}
            else{section.classList.add('visible');btn.classList.add('showing');btn.innerHTML='🙈 隐藏答案';}
        }

        // ============= 下载功能 =============
        function buildExportHTML() {
            const name = document.getElementById('studentName').value || '未填写';
            const date = document.getElementById('practiceDate').value || new Date().toISOString().slice(0,10);
            const timeStr = document.getElementById('timerDisplay').textContent;
            let html = `<div class="export-page">
                <div class="export-header">
                    <h2>口算练习作业</h2>
                    <div class="export-info">
                        <span>姓名：${name}</span>
                        <span>日期：${date}</span>
                        <span>用时：${timeStr}</span>
                    </div>
                </div>
                <div class="export-list">`;

            currentQuestions.forEach((q, idx) => {
                const userVal = userAnswers[idx] || '';
                const correct = q.blankAnswer;
                const isWrong = errorQuestions.has(idx);
                const firstWrong = firstWrongAnswers[idx];
                const hasCorrection = firstWrong && !isWrong && userVal === String(correct); // 曾经错现在正确

                let display = getQuestionString(q, userVal);
                let suffix = '';
                if (hasCorrection) {
                    suffix = ` <span class="wrong-mark">${firstWrong}</span><span class="correction">△:${correct}</span>`;
                } else if (isWrong) {
                    suffix = ` <span class="wrong-mark">✗ ${userVal}</span>`;
                } else if (userVal !== '') {
                    suffix = ` ✓`;
                }
                html += `<div class="export-item">${idx+1}. ${display}${suffix}</div>`;
            });
            html += `</div></div>`;
            return html;
        }

        async function downloadPDF() {
            const exportHTML = buildExportHTML();
            const container = document.getElementById('exportContainer');
            container.innerHTML = exportHTML;
            container.style.display = 'block';
            // 使用打印功能生成PDF
            window.print();
            container.style.display = 'none';
        }

        async function downloadImage() {
            const exportHTML = buildExportHTML();
            const container = document.getElementById('exportContainer');
            container.innerHTML = exportHTML;
            container.style.display = 'block';
            // 等待渲染
            await new Promise(resolve => setTimeout(resolve, 300));
            try {
                const canvas = await html2canvas(container.querySelector('.export-page'), {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    logging: false
                });
                const link = document.createElement('a');
                link.download = `口算练习_${document.getElementById('studentName').value||'未命名'}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } catch (e) {
                alert('图片生成失败，请重试。');
            }
            container.style.display = 'none';
        }

        function printMultiplePages(){
            const input=document.getElementById('pageCountInput');let pages=parseInt(input.value,10);
            if(isNaN(pages)||pages<1)pages=1;if(pages>10)pages=10;input.value=pages;
            const totalQuestions=pages*100,allQuestions=generateQuestionSet(totalQuestions);let printHTML='';
            for(let p=0;p<pages;p++){
                const start=p*100,pageQuestions=allQuestions.slice(start,start+100);
                const day1=pageQuestions.slice(0,50),day2=pageQuestions.slice(50,100);
                printHTML+=`<div class="print-page"><div class="page-header"><h2>口 算 练 习</h2><div class="info-line"><span>姓名：__________</span><span>日期：__________</span><span>用时：__________</span></div></div>`;
                printHTML+=`<div class="day-block"><div class="day-title">第 ${p*2+1} 天</div><div class="questions-grid-print">`;
                day1.forEach(q=>printHTML+=`<div class="q-item">${getQuestionString(q)}</div>`);
                printHTML+=`</div></div><div class="day-block"><div class="day-title">第 ${p*2+2} 天</div><div class="questions-grid-print">`;
                day2.forEach(q=>printHTML+=`<div class="q-item">${getQuestionString(q)}</div>`);
                printHTML+=`</div></div></div>`;
            }
            document.getElementById('printContainer').innerHTML=printHTML;
            if(document.getElementById('answersSection').classList.contains('visible'))toggleAnswers();
            setTimeout(()=>window.print(),150);
        }

        function generateQuestions(){
            resetTimerOnly();
            const qs=generateQuestionSet(50);
            renderScreenQuestions(qs);renderScreenAnswers(qs);
            document.getElementById('infoBadge').textContent=`共${qs.length}道题`;
            document.getElementById('mainCard').scrollIntoView({behavior:'smooth',block:'start'});
        }

        document.addEventListener('keydown',function(e){
            if(activeQuestionIndex<0)return;
            if(e.key>='0'&&e.key<='9'){e.preventDefault();inputDigit(e.key);}
            else if(e.key==='Backspace'){e.preventDefault();inputBackspace();}
            else if(e.key==='Delete'){e.preventDefault();inputClear();}
            else if(e.key==='Enter'){e.preventDefault();confirmAndNext();}
            else if(e.key==='Escape'){e.preventDefault();hideKeyboard();}
        });
        document.addEventListener('click',function(e){
            if(activeQuestionIndex>=0){
                const panel=document.getElementById('keyboardPanel');
                if(!panel.contains(e.target)&&!e.target.classList.contains('blank')&&!e.target.closest('.question-item')){
                    if(currentInput!=='')userAnswers[activeQuestionIndex]=currentInput;
                    hideKeyboard();
                }
            }
        });

        window.generateQuestions=generateQuestions;
        window.toggleAnswers=toggleAnswers;
        window.printMultiplePages=printMultiplePages;
        window.downloadPDF=downloadPDF;
        window.downloadImage=downloadImage;
        window.handleTimerClick=handleTimerClick;
        window.resetTimerOnly=resetTimerOnly;
        window.inputDigit=inputDigit;window.inputBackspace=inputBackspace;window.inputClear=inputClear;
        window.confirmAndNext=confirmAndNext;window.activateQuestion=activateQuestion;

        document.addEventListener('DOMContentLoaded',()=>{generateQuestions();updateTimerDisplay();});
    })();
</script>
</body>
</html>
