<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>口算练习 - 100以内不进位不退位加减法（移动适配版）</title>
    <style>
        :root {
            --bg: #fdf8f3; --card-bg: #ffffff; --primary: #4a90d9; --accent: #f6a623;
            --success: #4caf84; --error-bg: #ffe0e0; --text: #3e3e3e; --border: #e8e0d8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'KaiTi','STKaiti','楷体',sans-serif; background: var(--bg);
            min-height:100vh; padding:20px 20px 200px; display:flex; flex-direction:column; align-items:center;
            transition: padding-bottom 0.3s;
        }
        .toolbar {
            position:sticky; top:16px; z-index:100; display:flex; flex-wrap:wrap; gap:10px;
            justify-content:center; align-items:center; background:var(--card-bg); border-radius:50px;
            padding:12px 24px; box-shadow:0 4px 20px rgba(0,0,0,0.06); border:1px solid var(--border);
            margin-bottom:28px;
        }
        .toolbar button {
            font-family:inherit; font-size:0.9rem; font-weight:600; padding:8px 18px;
            border-radius:50px; border:none; cursor:pointer; transition:0.25s; white-space:nowrap;
            display:flex; align-items:center; gap:6px; user-select:none;
        }
        .btn-generate { background:var(--primary); color:#fff; }
        .btn-timer { background:#fff; color:#e8784a; border:2px solid #e8784a; min-width:110px; justify-content:center; }
        .btn-timer.running { background:#fff5f0; border-color:#d45d2a; animation:pulse 1.5s infinite; }
        .btn-timer.submitted { background:#f0f0f0; border-color:#ccc; color:#999; cursor:not-allowed; }
        @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(232,120,74,0.3); } 50%{ box-shadow:0 0 0 8px rgba(232,120,74,0); } }
        .btn-reset { background:#fff; border:2px solid #e8e0d8; color:#999; width:42px; height:42px; border-radius:50%; padding:0; justify-content:center; font-size:1.2rem; }
        .btn-img { background:#fff; color:#2c3e50; border:2px solid #2c3e50; }
        .btn-answer { background:#fff; color:var(--accent); border:2px solid var(--accent); }
        .separator { width:1px; height:28px; background:var(--border); margin:0 4px; }
        .timer-display { font-family:monospace; font-size:1.1rem; font-weight:700; color:#e8784a; min-width:55px; text-align:center; }

        .main-card { background:var(--card-bg); border-radius:16px; box-shadow:0 4px 20px rgba(0,0,0,0.06); border:1px solid var(--border); padding:28px 24px 20px; width:100%; max-width:1000px; }
        .title-area { text-align:center; margin-bottom:20px; }
        .title-area h1 { font-size:1.6rem; color:#4a4a4a; }
        .info-inputs { display:flex; justify-content:center; gap:20px; margin-top:8px; font-size:0.85rem; color:#666; }
        .info-inputs input { font-family:inherit; font-size:0.9rem; border:none; border-bottom:1.5px dashed #ccc; outline:none; width:100px; text-align:center; background:transparent; }
        .info-inputs input:focus { border-bottom-color:var(--accent); }

        /* 桌面端题目网格 3列 */
        .questions-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px 14px; counter-reset:qnum; }
        @media (min-width:900px){ .questions-grid { grid-template-columns:repeat(3,1fr); } }
        .question-item {
            display:flex; align-items:center; gap:2px; font-size:1.15rem; font-weight:600;
            padding:7px 6px 7px 34px; border-bottom:1px dashed #f0ebe2; white-space:nowrap;
            border-radius:6px; counter-increment:qnum; position:relative;
        }
        .question-item::before { content:counter(qnum) "."; position:absolute; left:6px; font-size:0.75rem; color:#c5bfb6; }
        .question-item.active { background:#fffdf5; box-shadow:inset 0 0 0 2px var(--accent); border-radius:8px; }
        .question-item.error { background:var(--error-bg); }
        .blank {
            display:inline-block; min-width:38px; border-bottom:2.5px solid #555; margin:0 3px;
            text-align:center; color:#aaa; font-weight:700; cursor:pointer; padding:0 2px; border-radius:2px;
        }
        .blank.filled { color:#2c6e49; border-bottom-color:#4caf84; }
        .blank.active-blank { border-bottom-color:var(--accent); color:#e8784a; background:#fff8ee; animation:blink 0.8s infinite; min-width:42px; }
        @keyframes blink { 0%,100%{ border-bottom-width:3px; } 50%{ border-bottom-width:1.5px; } }

        .keyboard-panel {
            position:fixed; bottom:0; z-index:200; background:#fff; border-top:2px solid #e8e0d8;
            box-shadow:0 -4px 20px rgba(0,0,0,0.1); padding:10px 16px 16px; transform:translateY(100%);
            transition: transform 0.35s, padding-bottom 0.3s; display:flex; gap:12px; max-width:600px; left:50%; transform:translateX(-50%) translateY(100%); border-radius:16px 16px 0 0;
        }
        .keyboard-panel.visible { transform:translateX(-50%) translateY(0); }
        .key-main { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; flex:1; }
        .key-main button { font-family:inherit; font-size:1.3rem; font-weight:700; padding:12px; border-radius:12px; border:2px solid #e8e0d8; background:#fafaf7; cursor:pointer; min-height:48px; }
        .key-del { color:#c0392b; }
        .key-side { display:flex; flex-direction:column; gap:8px; min-width:70px; }
        .preview { font-size:1.4rem; font-weight:700; text-align:center; padding:10px; background:#fffdf5; border:2px dashed #e0d8c8; border-radius:12px; color:#e8784a; min-height:44px; display:flex; align-items:center; justify-content:center; }
        .preview.empty { color:#ccc; }
        .btn-done { font-family:inherit; font-size:1rem; font-weight:700; padding:12px; border-radius:12px; border:none; background:var(--success); color:#fff; cursor:pointer; }

        @media print {
            body { background:#fff !important; padding:0 !important; }
            .toolbar, .main-card, .keyboard-panel, #exportContainer { display:none !important; }
            #printContainer { display:block !important; }
            @page { size:A4; margin:8mm 16mm; }
            .print-page { page-break-after:always; display:flex; flex-direction:column; height:100%; font-family:'KaiTi','楷体',sans-serif; }
            .print-page:last-child { page-break-after:auto; }
            .page-header { text-align:center; margin-bottom:3mm; }
            .page-header h2 { font-size:16pt; }
            .info-line { font-size:9pt; display:flex; justify-content:center; gap:10mm; }
            .day-block { flex:1; display:flex; flex-direction:column; }
            .day-block + .day-block { margin-top: 4mm; }
            .day-title { font-size:10pt; font-weight:bold; border-bottom:1px dashed #000; padding-bottom:1.5mm; margin-bottom:2mm; }
            .questions-grid-print { display:grid; grid-template-columns:repeat(4,1fr); gap:3mm 6mm; flex:1; }
            .q-item { font-size:10pt; white-space:nowrap; line-height:1.8; }
        }

        #exportContainer { position: absolute; left: -9999px; top: 0; width: 1000px; }
        .export-page { padding: 20px; background: #fff; font-family: 'KaiTi','楷体',sans-serif; width: 100%; max-width: 1000px; margin: 0 auto; }
        .export-header { text-align:center; margin-bottom:10px; }
        .export-header h2 { font-size: 20pt; }
        .export-info { font-size: 11pt; display:flex; justify-content:center; gap:20px; margin-bottom:10px; }
        .export-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4mm 8mm; }
        .export-item { font-size: 11pt; line-height: 1.8; white-space: nowrap; }
        .wrong-mark { color: #e74c3c; }
        .correction { color: #e74c3c; margin-left: 4px; }
        .export-blank { text-decoration: underline; min-width: 30px; display: inline-block; text-align: center; margin: 0 2px; }

        /* 移动端优化 */
        @media (max-width: 640px) {
            body { padding: 10px 10px 180px; }
            .toolbar {
                padding: 8px 12px; gap: 6px; border-radius: 30px;
            }
            .toolbar button {
                font-size: 0.75rem; padding: 6px 12px;
            }
            .btn-timer { min-width: 90px; }
            .btn-reset { width: 36px; height: 36px; font-size: 1rem; }
            .timer-display { font-size: 0.9rem; min-width: 45px; }
            .separator { display: none; }
            .main-card { padding: 16px 10px 12px; border-radius: 12px; }
            .title-area h1 { font-size: 1.3rem; }
            .info-inputs { gap: 10px; font-size: 0.75rem; }
            .info-inputs input { width: 70px; font-size: 0.8rem; }
            .questions-grid {
                grid-template-columns: repeat(2, 1fr); gap: 4px 6px;
            }
            .question-item {
                font-size: 0.78rem; padding: 5px 3px 5px 22px; letter-spacing: 0.2px;
            }
            .question-item::before {
                left: 2px; font-size: 0.65rem; min-width: 16px;
            }
            .blank {
                min-width: 28px; margin: 0 1px; border-bottom-width: 2px;
            }
            .blank.active-blank { min-width: 32px; }
            .keyboard-panel {
                max-width: 100%; border-radius: 12px 12px 0 0; padding: 8px 10px 12px; gap: 8px;
            }
            .key-main button {
                font-size: 1.1rem; padding: 10px 6px; min-height: 40px; border-radius: 8px;
            }
            .key-side { min-width: 55px; }
            .preview { font-size: 1.1rem; padding: 8px 4px; min-height: 36px; }
            .btn-done { font-size: 0.85rem; padding: 10px 8px; }
            .print-group { flex-wrap: wrap; gap: 4px; font-size: 0.75rem; }
            .print-group input { width: 40px; padding: 4px 6px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn-generate" onclick="generateQuestions()">🔄 重新生成</button>
    <span class="separator"></span>
    <button class="btn-timer" id="btnTimer" onclick="handleTimerClick()">▶ 开始计时</button>
    <span class="timer-display" id="timerDisplay">00:00</span>
    <button class="btn-reset" onclick="resetTimerOnly()">↺</button>
    <span class="separator"></span>
    <button class="btn-img" onclick="downloadImage()">📥 保存图片</button>
    <span class="separator"></span>
    <button class="btn-answer" id="btnAnswer" onclick="toggleAnswers()">👁️ 显示答案</button>
    <span class="separator"></span>
    <div class="print-group" style="display:flex;align-items:center;gap:8px;">
        <span>📄 打印页数：</span>
        <input type="number" id="pageCountInput" value="1" min="1" max="10" step="1" style="width:50px;padding:6px;border-radius:20px;border:2px solid #e8e0d8;text-align:center;">
        <span style="font-size:0.8rem;color:#999;">（每页100题）</span>
        <button class="btn-print" onclick="printMultiplePages()">🖨️ 打印</button>
    </div>
    <span class="info-badge">共50题</span>
</div>

<div class="main-card" id="mainCard">
    <div class="title-area">
        <h1>🌟 口 算 练 习 ✏️</h1>
        <p style="color:#999;">100以内 · 不进位不退位 · 加减法</p>
        <div class="info-inputs">
            <label>姓名：<input type="text" id="studentName" placeholder="输入姓名"></label>
            <label>日期：<input type="text" id="practiceDate" placeholder="2026-07-07"></label>
        </div>
    </div>
    <div class="questions-grid" id="questionsGrid"></div>
    <div class="answers-section" id="answersSection" style="display:none;">
        <h3>📋 答 案 参 考</h3>
        <div class="answers-grid" id="answersGrid"></div>
    </div>
</div>

<div class="keyboard-panel" id="keyboardPanel">
    <div class="key-main">
        <button onclick="inputDigit('1')">1</button><button onclick="inputDigit('2')">2</button><button onclick="inputDigit('3')">3</button>
        <button onclick="inputDigit('4')">4</button><button onclick="inputDigit('5')">5</button><button onclick="inputDigit('6')">6</button>
        <button onclick="inputDigit('7')">7</button><button onclick="inputDigit('8')">8</button><button onclick="inputDigit('9')">9</button>
        <button class="key-del" onclick="inputBackspace()">⌫</button><button onclick="inputDigit('0')">0</button><button class="key-clear" onclick="inputClear()">✕</button>
    </div>
    <div class="key-side">
        <div class="preview empty" id="keyboardPreview">___</div>
        <button class="btn-done" onclick="confirmAndNext()">✓ 好了</button>
    </div>
</div>

<div id="printContainer" style="display:none;"></div>
<div id="exportContainer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js">
</script>
<script>
    (function() {
        let currentQuestions = [], userAnswers = {}, firstWrongAnswers = {}, errorQuestions = new Set();
        let reviewMode = false, isSubmitted = false, activeIdx = -1, currentInput = '';
        let isOverwritePending = false;
        let timerSec = 0, timerInterval = null, timerRunning = false;
        const MAX_LEN = 3;

        const nameInput = document.getElementById('studentName');
        const savedName = localStorage.getItem('oralMathName');
        if (savedName) nameInput.value = savedName;
        nameInput.addEventListener('input', () => localStorage.setItem('oralMathName', nameInput.value));

        function rInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
        function noCarry(a,b){ return (a%10 + b%10 <10) && (Math.floor(a/10)+Math.floor(b/10)<10) && a+b<100; }
        function noBorrow(a,b){ return a>=b && (a%10 >= b%10) && (Math.floor(a/10) >= Math.floor(b/10)); }
        function genAdd(){
            for(let i=0;i<200;i++){ let a=rInt(3,85), b=rInt(1,98-a); if(noCarry(a,b)) return {op:[a,b], ops:['+'], res:a+b}; }
            return {op:[10,20], ops:['+'], res:30};
        }
        function genSub(){
            for(let i=0;i<200;i++){ let a=rInt(10,95), b=rInt(1,a); if(noBorrow(a,b)) return {op:[a,b], ops:['-'], res:a-b}; }
            return {op:[30,10], ops:['-'], res:20};
        }
        function genThree(){
            let type=rInt(0,2);
            for(let i=0;i<300;i++){
                if(type===0){
                    let a=rInt(3,70), b=rInt(1,98-a); if(!noCarry(a,b)) continue;
                    let sum=a+b; let c=rInt(1,98-sum); if(noCarry(sum,c)) return {op:[a,b,c], ops:['+','+'], res:sum+c};
                }else if(type===1){
                    let a=rInt(5,70), b=rInt(1,98-a); if(!noCarry(a,b)) continue;
                    let sum=a+b; let c=rInt(1,sum); if(noBorrow(sum,c)) return {op:[a,b,c], ops:['+','-'], res:sum-c};
                }else{
                    let a=rInt(15,90), b=rInt(1,a); if(!noBorrow(a,b)) continue;
                    let diff=a-b; let c=rInt(1,98-diff); if(noCarry(diff,c)) return {op:[a,b,c], ops:['-','+'], res:diff+c};
                }
            }
            return genAdd();
        }
        function genQuestion(){
            let useThree=Math.random()<0.35;
            let q=useThree?genThree():(Math.random()<0.5?genAdd():genSub());
            let blankPos, r=Math.random();
            let len=q.op.length;
            if(r<0.45) blankPos=0; else if(r<0.75) blankPos=1; else if(r<0.95&&len>=2) blankPos=2; else if(len>=3) blankPos=3; else blankPos=0;
            let ans=(blankPos===0)?q.res:q.op[blankPos-1];
            return {op:q.op, ops:q.ops, res:q.res, blankPos, ans, len};
        }
        function genSet(count){
            let set=[], seen=new Set();
            while(set.length<count){
                let q=genQuestion();
                let key=`${q.op.join(',')}|${q.ops.join(',')}|${q.blankPos}`;
                if(seen.has(key)) continue;
                seen.add(key); set.push(q);
            }
            return set;
        }
        function qStr(q, uval){
            let parts=[];
            for(let i=0;i<q.len;i++){
                if(i>0) parts.push(` ${q.ops[i-1]} `);
                parts.push(q.blankPos===i+1? (uval!==undefined&&uval!==''?uval:'______') : q.op[i]);
            }
            parts.push(' = ', q.blankPos===0? (uval!==undefined&&uval!==''?uval:'______') : q.res);
            return parts.join('');
        }

        function checkAll(){ for(let i=0;i<currentQuestions.length;i++) if(!userAnswers[i]) return false; return currentQuestions.length>0; }
        function updateBtn(){
            let btn=document.getElementById('btnTimer');
            if(isSubmitted){ btn.textContent='✓ 已交卷'; btn.classList.add('submitted'); btn.disabled=true; }
            else if(checkAll()){ btn.textContent='📝 交卷'; btn.classList.remove('running','submitted'); btn.disabled=false; }
            else{ btn.textContent=timerRunning?'⏸ 暂停':'▶ 开始计时'; btn.classList.remove('submitted'); btn.disabled=false; }
        }
        function startTimer(){ if(!timerRunning&&!isSubmitted){ timerInterval=setInterval(()=>{timerSec++; updateTimerDisplay();},1000); timerRunning=true; updateBtn(); } }
        function pauseTimer(){ if(timerInterval){clearInterval(timerInterval);timerInterval=null;} timerRunning=false; updateBtn(); }
        function handleTimer(){
            if(isSubmitted) return;
            if(checkAll()) submitExam();
            else timerRunning?pauseTimer():startTimer();
        }
        function submitExam(){
            pauseTimer(); isSubmitted=true; checkAllAnswers(); updateBtn(); hideKeyboard();
        }
        function resetTimer(){
            clearInterval(timerInterval); timerInterval=null; timerRunning=false; timerSec=0; updateTimerDisplay();
            isSubmitted=false; reviewMode=false; errorQuestions.clear(); firstWrongAnswers={};
            document.querySelectorAll('.question-item.error').forEach(el=>el.classList.remove('error'));
            updateBtn();
        }
        function updateTimerDisplay(){
            let m=Math.floor(timerSec/60), s=timerSec%60;
            document.getElementById('timerDisplay').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
        }
        function checkAllAnswers(){
            errorQuestions.clear();
            currentQuestions.forEach((q,i)=>{
                let u=userAnswers[i];
                if(u!==undefined&&u!==''&&parseInt(u)!==q.ans){
                    if(!(i in firstWrongAnswers)) firstWrongAnswers[i]=u;
                    errorQuestions.add(i);
                    document.querySelector(`.question-item[data-qindex="${i}"]`)?.classList.add('error');
                }
            });
            reviewMode=true;
        }

        function showKey(){
            const panel = document.getElementById('keyboardPanel');
            panel.classList.add('visible');
            const panelHeight = panel.offsetHeight;
            document.body.style.paddingBottom = `${panelHeight + 20}px`;
        }
        function hideKey(){
            const panel = document.getElementById('keyboardPanel');
            panel.classList.remove('visible');
            document.body.style.paddingBottom = '200px';
            activeIdx=-1; currentInput=''; isOverwritePending = false; updateBlanks(); updatePreview();
            document.querySelectorAll('.active').forEach(el=>el.classList.remove('active'));
            document.querySelectorAll('.active-blank').forEach(el=>el.classList.remove('active-blank'));
        }
        function activateQuestion(idx){
            if(isSubmitted && !errorQuestions.has(idx)) return;
            startTimer();
            if(activeIdx===idx){
                if(userAnswers[idx]){
                    delete userAnswers[idx]; currentInput=''; updateBlanks(); updatePreview();
                    if(errorQuestions.has(idx)){ document.querySelector(`.question-item[data-qindex="${idx}"]`)?.classList.remove('error'); errorQuestions.delete(idx); }
                    updateBtn(); document.querySelector(`.question-item[data-qindex="${idx}"]`)?.scrollIntoView({behavior:'smooth',block:'center'});
                } return;
            }
            document.querySelectorAll('.active').forEach(el=>el.classList.remove('active'));
            document.querySelectorAll('.active-blank').forEach(el=>el.classList.remove('active-blank'));
            activeIdx=idx;
            currentInput = userAnswers[idx] || '';
            isOverwritePending = reviewMode && errorQuestions.has(idx);
            updateBlanks(); updatePreview();
            showKey();
            setTimeout(() => {
                const item = document.querySelector(`.question-item[data-qindex="${idx}"]`);
                if (item) {
                    const rect = item.getBoundingClientRect();
                    const keyboardHeight = document.getElementById('keyboardPanel').offsetHeight;
                    const windowHeight = window.innerHeight;
                    if (rect.bottom + keyboardHeight > windowHeight) {
                        const scrollY = window.scrollY + rect.top - (windowHeight - keyboardHeight - rect.height) / 2;
                        window.scrollTo({ top: scrollY, behavior: 'smooth' });
                    } else {
                        item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            }, 100);
            let item=document.querySelector(`.question-item[data-qindex="${idx}"]`);
            if(item){ item.classList.add('active'); item.querySelector('.blank')?.classList.add('active-blank'); }
        }
        function digit(d){
            if(activeIdx<0) return;
            if(isOverwritePending){
                currentInput = '';
                isOverwritePending = false;
            }
            if(currentInput.length >= MAX_LEN) return;
            currentInput += d;
            userAnswers[activeIdx] = currentInput;
            updateBlanks(); updatePreview(); updateBtn();
        }
        function backspace(){
            if(activeIdx<0||!currentInput) return;
            currentInput = currentInput.slice(0,-1);
            userAnswers[activeIdx] = currentInput;
            if(!currentInput) delete userAnswers[activeIdx];
            isOverwritePending = false;
            updateBlanks(); updatePreview(); updateBtn();
        }
        function clearInput(){
            if(activeIdx<0) return;
            currentInput = ''; delete userAnswers[activeIdx];
            isOverwritePending = false;
            updateBlanks(); updatePreview(); updateBtn();
        }
        function confirmNext(){
            if(activeIdx<0) return;
            if(currentInput!=='') userAnswers[activeIdx] = currentInput;
            if(reviewMode){
                let q=currentQuestions[activeIdx], u=userAnswers[activeIdx];
                if(u!==undefined&&u!==''&&parseInt(u)===q.ans){
                    errorQuestions.delete(activeIdx);
                    document.querySelector(`.question-item[data-qindex="${activeIdx}"]`)?.classList.remove('error');
                }else{
                    if(!(activeIdx in firstWrongAnswers)) firstWrongAnswers[activeIdx] = u;
                    errorQuestions.add(activeIdx);
                    document.querySelector(`.question-item[data-qindex="${activeIdx}"]`)?.classList.add('error');
                    alert('答案不对，请再试试！'); return;
                }
            }
            document.querySelector(`.question-item[data-qindex="${activeIdx}"]`)?.classList.add('completed');
            updateBtn();
            let next = activeIdx+1;
            if(next < currentQuestions.length) activateQuestion(next);
            else {
                hideKey(); window.scrollTo({top:0,behavior:'smooth'});
                if(isSubmitted && errorQuestions.size===0) setTimeout(downloadImage,500);
            }
        }
        function updatePreview(){ let p=document.getElementById('keyboardPreview'); p.textContent=currentInput||'___'; p.classList.toggle('empty',!currentInput); }
        function updateBlanks(){
            document.querySelectorAll('.blank').forEach(b=>{
                let i=parseInt(b.dataset.qindex);
                if(!isNaN(i)&&userAnswers[i]!==undefined&&userAnswers[i]!==''){ b.textContent=userAnswers[i]; b.classList.add('filled'); }
                else{ b.textContent='___'; b.classList.remove('filled'); }
            });
        }

        function renderScreen(qs){
            let grid=document.getElementById('questionsGrid'); grid.innerHTML='';
            currentQuestions=qs; userAnswers={}; firstWrongAnswers={}; errorQuestions.clear(); reviewMode=false; isSubmitted=false;
            activeIdx=-1; currentInput=''; isOverwritePending = false; hideKey();
            qs.forEach((q,i)=>{
                let item=document.createElement('div'); item.className='question-item'; item.dataset.qindex=i;
                item.onclick=function(e){ if(e.target.classList.contains('blank')){ e.stopPropagation(); activateQuestion(i); } };
                let html='';
                for(let j=0;j<q.len;j++){
                    if(j>0) html+=`<span class="operator"> ${q.ops[j-1]} </span>`;
                    if(q.blankPos===j+1) html+=`<span class="blank" data-qindex="${i}">___</span>`;
                    else html+=`<span class="number">${q.op[j]}</span>`;
                }
                html+=`<span class="equals"> = </span>`;
                if(q.blankPos===0) html+=`<span class="blank" data-qindex="${i}">___</span>`;
                else html+=`<span class="number">${q.res}</span>`;
                item.innerHTML=html; grid.appendChild(item);
            });
            updateBtn(); updatePreview();
        }
        function renderAnswers(qs){
            let grid=document.getElementById('answersGrid'); grid.innerHTML='';
            qs.forEach((q,i)=>{ let d=document.createElement('div'); d.textContent=`${i+1}. ${q.ans}`; grid.appendChild(d); });
        }
        function toggleAnswers(){
            let sec=document.getElementById('answersSection'), btn=document.getElementById('btnAnswer');
            let vis=sec.style.display==='block';
            sec.style.display=vis?'none':'block'; btn.classList.toggle('showing',!vis); btn.innerHTML=vis?'👁️ 显示答案':'🙈 隐藏答案';
        }

        function printMultiplePages(){
            let inp=document.getElementById('pageCountInput'); let pages=parseInt(inp.value)||1; if(pages>10) pages=10; inp.value=pages;
            let all=genSet(pages*100), html='';
            for(let p=0;p<pages;p++){
                let start=p*100, qs=all.slice(start,start+100), d1=qs.slice(0,50), d2=qs.slice(50,100);
                html+=`<div class="print-page"><div class="page-header"><h2>口 算 练 习</h2><div class="info-line"><span>姓名：______</span><span>日期：______</span><span>用时：______</span></div></div>`;
                html+=`<div class="day-block"><div class="day-title">第 ${p*2+1} 天</div><div class="questions-grid-print">`;
                d1.forEach(q=>html+=`<div class="q-item">${qStr(q)}</div>`);
                html+=`</div></div><div class="day-block"><div class="day-title">第 ${p*2+2} 天</div><div class="questions-grid-print">`;
                d2.forEach(q=>html+=`<div class="q-item">${qStr(q)}</div>`);
                html+=`</div></div></div>`;
            }
            document.getElementById('printContainer').innerHTML=html;
            document.getElementById('printContainer').style.display='block';
            setTimeout(()=>{ window.print(); document.getElementById('printContainer').style.display='none'; },200);
        }

        function exportQStr(q, val) {
            let parts = '';
            for (let i = 0; i < q.len; i++) {
                if (i > 0) parts += ` ${q.ops[i - 1]} `;
                if (q.blankPos === i + 1) {
                    parts += `<span class="export-blank">${val !== undefined && val !== '' ? val : '______'}</span>`;
                } else {
                    parts += q.op[i];
                }
            }
            parts += ' = ';
            if (q.blankPos === 0) {
                parts += `<span class="export-blank">${val !== undefined && val !== '' ? val : '______'}</span>`;
            } else {
                parts += q.res;
            }
            return parts;
        }

        function buildExport(){
            let name = document.getElementById('studentName').value || '未填';
            let date = document.getElementById('practiceDate').value || new Date().toISOString().slice(0,10);
            let time = document.getElementById('timerDisplay').textContent;
            let tempErrors = new Set();
            currentQuestions.forEach((q,i)=>{
                let u = userAnswers[i];
                if(u !== undefined && u !== '' && parseInt(u) !== q.ans) tempErrors.add(i);
            });

            let html = `<div class="export-page">
                <div class="export-header"><h2>口算练习作业</h2></div>
                <div class="export-info"><span>姓名：${name}</span><span>日期：${date}</span><span>用时：${time}</span></div>
                <div class="export-list">`;
            currentQuestions.forEach((q,i)=>{
                let u = userAnswers[i] || '';
                let correct = q.ans;
                let isError = tempErrors.has(i);
                let hasFirstWrong = firstWrongAnswers.hasOwnProperty(i);
                let isCorrected = hasFirstWrong && !isError;
                let displayVal = u;
                let suffix = '';
                if (isCorrected) {
                    displayVal = firstWrongAnswers[i];
                    suffix = ` <span class="correction">△:${correct}</span>`;
                } else if (isError) {
                    displayVal = u;
                    suffix = ` <span class="wrong-mark">✗</span>`;
                } else if (u !== '') {
                    suffix = ' ✓';
                }
                let str = exportQStr(q, displayVal);
                html += `<div class="export-item">${i+1}. ${str}${suffix}</div>`;
            });
            html += `</div></div>`;
            return html;
        }

        async function downloadImage(){
            let container = document.getElementById('exportContainer');
            container.innerHTML = buildExport();
            container.style.display = 'block';
            await new Promise(resolve => setTimeout(resolve, 300));
            let el = container.querySelector('.export-page');
            let canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', logging: false });
            container.style.display = 'none';
            let date = document.getElementById('practiceDate').value || new Date().toISOString().slice(0,10);
            canvas.toBlob(function(blob) {
                let url = URL.createObjectURL(blob);
                let link = document.createElement('a');
                link.href = url;
                link.download = `${date}_口算练习.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }, 'image/png');
        }

        function generateQuestions(){
            resetTimer();
            let qs = genSet(50);
            renderScreen(qs);
            renderAnswers(qs);
        }

        document.addEventListener('keydown',function(e){
            if(activeIdx<0) return;
            if(e.key>='0'&&e.key<='9'){ e.preventDefault(); digit(e.key); }
            else if(e.key==='Backspace'){ e.preventDefault(); backspace(); }
            else if(e.key==='Delete'){ e.preventDefault(); clearInput(); }
            else if(e.key==='Enter'){ e.preventDefault(); confirmNext(); }
            else if(e.key==='Escape'){ e.preventDefault(); hideKey(); }
        });
        document.addEventListener('click',function(e){
            if(activeIdx>=0){
                let panel = document.getElementById('keyboardPanel');
                if(!panel.contains(e.target) && !e.target.classList.contains('blank') && !e.target.closest('.question-item')){
                    if(currentInput) userAnswers[activeIdx] = currentInput;
                    hideKey();
                }
            }
        });

        window.generateQuestions = generateQuestions;
        window.toggleAnswers = toggleAnswers;
        window.printMultiplePages = printMultiplePages;
        window.downloadImage = downloadImage;
        window.handleTimerClick = handleTimer;
        window.resetTimerOnly = resetTimer;
        window.inputDigit = digit;
        window.inputBackspace = backspace;
        window.inputClear = clearInput;
        window.confirmAndNext = confirmNext;
        window.activateQuestion = activateQuestion;

        document.addEventListener('DOMContentLoaded', generateQuestions);
    })();
</script>
</body>
</html>
